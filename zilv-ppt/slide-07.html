<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<title>自律与自由</title>
<style>
:root {
  --bg: #F2F7F4; --container: #FFFFFF; --container-2: #E8F0EC;
  --accent: #5B8C5A; --accent-soft: rgba(91,140,90,0.12);
  --text-primary: #2D4A2C; --text-secondary: #5B8C5A; --text-muted: #8FAF8E;
  --border: rgba(91,140,90,0.18); --shadow: 0 4px 16px rgba(45,74,44,0.08);
  --radius: 12px; --font: 'Inter','PingFang SC',sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 1280px; height: 720px; overflow: hidden;
  background: var(--bg); font-family: var(--font); color: var(--text-primary);
}
[contenteditable]:hover { outline: 1px dashed rgba(255,255,255,0.5); border-radius: 3px; }
[contenteditable]:focus { outline: 2px solid rgba(255,255,255,0.7); border-radius: 3px; background: rgba(255,255,255,0.05); }
[contenteditable] { outline: none; cursor: text; }
.slide-number { position: absolute; bottom: 16px; right: 24px; font-size: 12px; color: rgba(255,255,255,0.4); }

/* 沉浸式深绿背景 */
body {
  background-image:
    linear-gradient(rgba(18,42,20,0.65), rgba(18,42,20,0.72)),
    url('images/slide-07-bg.jpg');
  background-size: cover; background-position: center;
  color: #fff;
}

/* 居中金句布局 */
.quote-wrap {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center; gap: 24px; padding: 48px 120px;
}
.section-label {
  font-size: 11px; letter-spacing: 4px; text-transform: uppercase;
  color: rgba(160,200,120,0.85); font-weight: 600;
}
.quote-main {
  font-size: 56px; font-weight: 900; line-height: 1.15;
  color: #fff; max-width: 820px;
  text-shadow: 0 2px 32px rgba(0,0,0,0.4);
}
.quote-accent { color: #A3D977; }
.divider-line {
  width: 64px; height: 2px;
  background: rgba(160,200,120,0.6); border-radius: 2px;
}

.sub-quotes {
  display: flex; gap: 40px; margin-top: 8px;
}
.sub-quote-item {
  display: flex; flex-direction: column; gap: 6px; align-items: center;
  max-width: 300px;
}
.sub-quote-text {
  font-size: 15.5px; color: rgba(255,255,255,0.75); line-height: 1.6; text-align: center;
}

/* 底部装饰条 */
.bottom-bar {
  position: absolute; bottom: 0; left: 0; right: 0; height: 4px;
  background: linear-gradient(to right, transparent, #A3D977, transparent);
  opacity: 0.5;
}
/* 四角叶片装饰 */
.leaf-deco-tl, .leaf-deco-br {
  position: absolute; font-size: 80px; opacity: 0.06; pointer-events: none;
  line-height: 1;
}
.leaf-deco-tl { top: 24px; left: 32px; transform: rotate(-20deg); }
.leaf-deco-br { bottom: 40px; right: 40px; transform: rotate(160deg); }
</style>
</head>
<body>

<div class="leaf-deco-tl">🌿</div>
<div class="leaf-deco-br">🌿</div>
<div class="bottom-bar"></div>

<div class="quote-wrap">
  <span class="section-label" contenteditable="true">REFLECTION · 自律与自由</span>
  <div class="quote-main" contenteditable="true">
    自律，不是<span class="quote-accent">束缚</span>，<br>而是通向<span class="quote-accent">真自由</span>的路
  </div>
  <div class="divider-line"></div>
  <div class="sub-quotes">
    <div class="sub-quote-item">
      <p class="sub-quote-text" contenteditable="true">短期放纵看似轻松，实则是对未来的透支——今日的懈怠，是明日代价的种子。</p>
    </div>
    <div class="sub-quote-item">
      <p class="sub-quote-text" contenteditable="true">长期自律换来的，是真正属于你的选择权：<br>做什么、成为谁、去哪里。</p>
    </div>
  </div>
</div>

<div class="slide-number" contenteditable="false">7 / 8</div>
</body>
</html>
