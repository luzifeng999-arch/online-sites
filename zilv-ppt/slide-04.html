<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<title>不自律的代价</title>
<style>
:root {
  --bg: #F2F7F4; --container: #FFFFFF; --container-2: #E8F0EC;
  --accent: #5B8C5A; --accent-soft: rgba(91,140,90,0.10);
  --text-primary: #2D4A2C; --text-secondary: #5B8C5A; --text-muted: #8FAF8E;
  --border: rgba(91,140,90,0.18); --shadow: 0 4px 16px rgba(45,74,44,0.08);
  --radius: 12px; --font: 'Inter','PingFang SC',sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 1280px; height: 720px; overflow: hidden;
  background: var(--bg); font-family: var(--font); color: var(--text-primary);
}
[contenteditable]:hover { outline: 1px dashed var(--accent); border-radius: 3px; }
[contenteditable]:focus { outline: 2px solid var(--accent); border-radius: 3px; background: var(--accent-soft); }
[contenteditable] { outline: none; cursor: text; }
.slide-number { position: absolute; bottom: 16px; right: 24px; font-size: 12px; color: var(--text-muted); }

body {
  background-image:
    linear-gradient(rgba(242,247,244,0.94), rgba(242,247,244,0.94)),
    url('images/slide-04-bg.jpg');
  background-size: cover;
}

.page-header {
  position: absolute; top: 36px; left: 52px; right: 52px; height: 72px;
  display: flex; flex-direction: column; gap: 4px;
}
.ph-eyebrow { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--accent); font-weight: 600; }
.ph-title { font-size: 28px; font-weight: 700; color: var(--text-primary); margin: 0; line-height: 1.2; }
.ph-line { width: 48px; height: 2px; background: var(--accent); border-radius: 1px; margin-top: 6px; }

/* G-3 错落卡片布局 */
.stagger-grid {
  position: absolute; top: 120px; left: 52px; right: 52px; bottom: 60px;
  display: flex; gap: 14px;
  align-items: stretch;
}
.sc-col { flex: 1; display: flex; flex-direction: column; }
.sc-col:nth-child(even) { padding-top: 44px; }
.sc-pct {
  font-size: 34px; font-weight: 900; margin-bottom: 8px; flex-shrink: 0;
  color: var(--text-primary); line-height: 1;
}
.sc-pct-sub { font-size: 11px; color: var(--text-muted); font-weight: 400; margin-left: 2px; }
.sc-card {
  flex: 1;
  display: flex; flex-direction: column; gap: 8px;
  padding: 16px 14px; border-radius: var(--radius);
  background: var(--container); border: 1px solid var(--border);
  box-shadow: var(--shadow); border-top: 3px solid var(--accent);
}
.sc-icon { font-size: 22px; flex-shrink: 0; }
.sc-name { font-size: 13.5px; font-weight: 700; color: var(--text-primary); line-height: 1.3; }
.sc-desc {
  font-size: 11.5px; color: var(--text-secondary); line-height: 1.6;
  flex: 1;
}
.sc-bar-wrap { margin-top: auto; padding-top: 8px; }
.sc-bar-bg { width: 100%; height: 3px; background: var(--border); border-radius: 2px; }
.sc-bar { height: 100%; background: var(--accent); border-radius: 2px; }

.insight-bar {
  position: absolute; bottom: 14px; left: 52px; right: 52px;
  background: rgba(91,140,90,0.08); border: 1px solid rgba(91,140,90,0.22);
  border-radius: 10px; padding: 9px 20px; font-size: 13px; color: var(--text-secondary);
}
.insight-bar span { color: var(--accent); font-weight: 700; }
</style>
</head>
<body>

<div class="page-header">
  <span class="ph-eyebrow" contenteditable="true">THE COST · 不自律的代价</span>
  <h2 class="ph-title" contenteditable="true">五种典型表现，长期侵蚀成长动力</h2>
  <div class="ph-line"></div>
</div>

<div class="stagger-grid">
  <!-- 高位列 -->
  <div class="sc-col">
    <div class="sc-card">
      <span class="sc-icon">⏳</span>
      <div class="sc-name" contenteditable="true">拖延症</div>
      <div class="sc-desc" contenteditable="true">明日复明日，事情越积越多，最终在压力中仓促应对，质量大打折扣。</div>
      <div class="sc-bar-wrap"><div class="sc-bar-bg"><div class="sc-bar" style="width:85%"></div></div></div>
    </div>
  </div>
  <!-- 低位列 -->
  <div class="sc-col">
    <div class="sc-card">
      <span class="sc-icon">🔥</span>
      <div class="sc-name" contenteditable="true">三分钟热度</div>
      <div class="sc-desc" contenteditable="true">激情燃尽后万事皆空，无数个"开始"却没有一个坚持到底的故事。</div>
      <div class="sc-bar-wrap"><div class="sc-bar-bg"><div class="sc-bar" style="width:72%"></div></div></div>
    </div>
  </div>
  <!-- 高位列 -->
  <div class="sc-col">
    <div class="sc-card">
      <span class="sc-icon">📱</span>
      <div class="sc-name" contenteditable="true">沉迷娱乐</div>
      <div class="sc-desc" contenteditable="true">短暂快感蚕食宝贵时光，刷完视频的空虚感换来的是被浪费的深夜。</div>
      <div class="sc-bar-wrap"><div class="sc-bar-bg"><div class="sc-bar" style="width:68%"></div></div></div>
    </div>
  </div>
  <!-- 低位列 -->
  <div class="sc-col">
    <div class="sc-card">
      <span class="sc-icon">🌊</span>
      <div class="sc-name" contenteditable="true">缺乏规划</div>
      <div class="sc-desc" contenteditable="true">随波逐流，方向感全无，每天忙碌却不知道在朝哪个方向前进。</div>
      <div class="sc-bar-wrap"><div class="sc-bar-bg"><div class="sc-bar" style="width:60%"></div></div></div>
    </div>
  </div>
  <!-- 高位列 -->
  <div class="sc-col">
    <div class="sc-card">
      <span class="sc-icon">🏳️</span>
      <div class="sc-name" contenteditable="true">容易放弃</div>
      <div class="sc-desc" contenteditable="true">面对困难第一反应是逃，把"放弃"包装成"调整方向"来自我安慰。</div>
      <div class="sc-bar-wrap"><div class="sc-bar-bg"><div class="sc-bar" style="width:55%"></div></div></div>
    </div>
  </div>
</div>

<div class="insight-bar" contenteditable="true">
  长期影响：这五种行为相互叠加，形成<span>恶性循环</span>，逐步侵蚀学习效率与未来发展空间。
</div>

<div class="slide-number" contenteditable="false">4 / 8</div>
</body>
</html>
