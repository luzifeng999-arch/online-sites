<style>
/* ========== DESIGN TOKENS ========== */
:root {
  --color-primary:        #4F6EF7;
  --color-primary-light:  #EEF1FE;
  --color-primary-dark:   #3352D9;
  --color-accent:         #22C7A9;
  --color-bg:             #F5F7FA;
  --color-sidebar:        #1A1E2E;
  --color-sidebar-hover:  #252B3E;
  --color-sidebar-active: #2E3650;
  --color-surface:        #FFFFFF;
  --color-border:         #E4E8F0;
  --color-text-primary:   #1A1E2E;
  --color-text-secondary: #6B7A99;
  --color-danger:         #F25B5B;
  --color-warning:        #F8A742;
  --color-success:        #22C7A9;
  --sidebar-width:        220px;
  --header-height:        60px;
  --radius-sm:            6px;
  --radius-md:            10px;
  --radius-lg:            14px;
  --shadow-sm:            0 1px 3px rgba(26,30,46,.06), 0 1px 2px rgba(26,30,46,.04);
  --shadow-md:            0 4px 12px rgba(26,30,46,.08), 0 2px 4px rgba(26,30,46,.04);
  --shadow-lg:            0 8px 24px rgba(26,30,46,.10);
  --font:                 'DM Sans', system-ui, sans-serif;
  --transition:           0.18s ease;
}

/* ========== RESET ========== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); background: var(--color-bg); color: var(--color-text-primary); font-size: 14px; line-height: 1.5; overflow: hidden; height: 100vh; display: flex; }

/* ========== SIDEBAR ========== */
.sidebar {
  width: var(--sidebar-width);
  background: var(--color-sidebar);
  height: 100vh;
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  position: relative;
  z-index: 10;
}
.sidebar-logo {
  height: var(--header-height);
  display: flex;
  align-items: center;
  padding: 0 20px;
  border-bottom: 1px solid rgba(255,255,255,.06);
}
.logo-icon {
  width: 32px; height: 32px;
  background: var(--color-primary);
  border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; color: #fff; font-size: 14px;
  margin-right: 10px;
  flex-shrink: 0;
}
.logo-text { color: #fff; font-weight: 600; font-size: 15px; letter-spacing: .3px; }
.logo-badge { background: var(--color-primary); color: #fff; font-size: 9px; font-weight: 700; padding: 1px 5px; border-radius: 4px; margin-left: 6px; letter-spacing: .5px; }

.sidebar-nav { flex: 1; padding: 12px 0; overflow-y: auto; }
.nav-section-label {
  font-size: 10px; font-weight: 600; letter-spacing: 1px;
  color: rgba(255,255,255,.3); text-transform: uppercase;
  padding: 16px 20px 6px;
}
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 20px;
  color: rgba(255,255,255,.55);
  text-decoration: none;
  font-size: 13.5px; font-weight: 500;
  border-radius: 0;
  cursor: pointer;
  transition: var(--transition);
  position: relative;
  border: none; background: none; width: 100%; text-align: left;
}
.nav-item:hover { background: var(--color-sidebar-hover); color: rgba(255,255,255,.85); }
.nav-item.active {
  background: var(--color-sidebar-active);
  color: #fff;
}
.nav-item.active::before {
  content: '';
  position: absolute; left: 0; top: 50%; transform: translateY(-50%);
  width: 3px; height: 20px;
  background: var(--color-primary);
  border-radius: 0 3px 3px 0;
}
.nav-icon { width: 18px; height: 18px; opacity: .7; flex-shrink: 0; }
.nav-item.active .nav-icon, .nav-item:hover .nav-icon { opacity: 1; }
.nav-badge {
  margin-left: auto;
  background: var(--color-primary);
  color: #fff; font-size: 10px; font-weight: 700;
  padding: 1px 6px; border-radius: 10px;
  font-variant-numeric: tabular-nums;
}

.sidebar-footer {
  padding: 16px 12px;
  border-top: 1px solid rgba(255,255,255,.06);
}
.user-card {
  display: flex; align-items: center; gap: 10px;
  padding: 8px;
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: var(--transition);
}
.user-card:hover { background: var(--color-sidebar-hover); }
.user-avatar {
  width: 32px; height: 32px; border-radius: 50%;
  background: linear-gradient(135deg, var(--color-primary), var(--color-accent));
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-weight: 700; font-size: 12px; flex-shrink: 0;
}
.user-info { flex: 1; min-width: 0; }
.user-name { color: #fff; font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.user-role { color: rgba(255,255,255,.35); font-size: 11px; }
.user-more { color: rgba(255,255,255,.3); }

/* ========== MAIN ========== */
.main { flex: 1; display: flex; flex-direction: column; min-width: 0; overflow: hidden; }

/* ========== TOPBAR ========== */
.topbar {
  height: var(--header-height);
  background: var(--color-surface);
  border-bottom: 1px solid var(--color-border);
  display: flex; align-items: center;
  padding: 0 24px;
  gap: 16px;
  flex-shrink: 0;
}
.topbar-title { font-size: 16px; font-weight: 600; color: var(--color-text-primary); }
.topbar-spacer { flex: 1; }
.search-box {
  display: flex; align-items: center; gap: 8px;
  background: var(--color-bg);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  padding: 7px 12px;
  width: 240px;
  transition: var(--transition);
}
.search-box:focus-within { border-color: var(--color-primary); background: #fff; box-shadow: 0 0 0 3px var(--color-primary-light); }
.search-box input { border: none; background: none; outline: none; font-size: 13px; color: var(--color-text-primary); width: 100%; font-family: var(--font); }
.search-box input::placeholder { color: var(--color-text-secondary); }
.search-icon { color: var(--color-text-secondary); flex-shrink: 0; }
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 16px;
  font-size: 13.5px; font-weight: 500;
  border-radius: var(--radius-md);
  cursor: pointer; border: none; outline: none;
  transition: var(--transition); font-family: var(--font);
}
.btn-primary { background: var(--color-primary); color: #fff; }
.btn-primary:hover { background: var(--color-primary-dark); transform: translateY(-1px); box-shadow: var(--shadow-md); }
.btn-ghost { background: transparent; color: var(--color-text-secondary); border: 1px solid var(--color-border); }
.btn-ghost:hover { background: var(--color-bg); color: var(--color-text-primary); }
.icon-btn {
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  border-radius: var(--radius-md); border: 1px solid var(--color-border);
  background: transparent; cursor: pointer; color: var(--color-text-secondary);
  transition: var(--transition);
}
.icon-btn:hover { background: var(--color-bg); color: var(--color-text-primary); }
.notif-dot { position: relative; }
.notif-dot::after {
  content: ''; position: absolute; top: 6px; right: 6px;
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--color-danger);
  border: 1.5px solid var(--color-surface);
}

/* ========== CONTENT ========== */
.content { flex: 1; overflow-y: auto; padding: 28px 28px 40px; }

/* ========== STATS ROW ========== */
.stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }
.stat-card {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  padding: 20px 22px;
  display: flex; align-items: flex-start; justify-content: space-between;
  transition: var(--transition);
  box-shadow: var(--shadow-sm);
}
.stat-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
.stat-label { font-size: 12px; font-weight: 500; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; }
.stat-value { font-size: 26px; font-weight: 700; color: var(--color-text-primary); font-variant-numeric: tabular-nums; line-height: 1; margin-bottom: 8px; }
.stat-trend {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 12px; font-weight: 500; padding: 2px 7px; border-radius: 6px;
}
.stat-trend.up { background: rgba(34,199,169,.12); color: var(--color-success); }
.stat-trend.down { background: rgba(242,91,91,.12); color: var(--color-danger); }
.stat-icon-wrap {
  width: 44px; height: 44px; border-radius: var(--radius-md);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.stat-icon-wrap.blue { background: var(--color-primary-light); color: var(--color-primary); }
.stat-icon-wrap.teal { background: rgba(34,199,169,.12); color: var(--color-accent); }
.stat-icon-wrap.orange { background: rgba(248,167,66,.12); color: var(--color-warning); }
.stat-icon-wrap.red { background: rgba(242,91,91,.12); color: var(--color-danger); }

/* ========== SECTION HEADER ========== */
.section-header { display: flex; align-items: center; margin-bottom: 16px; }
.section-title { font-size: 15px; font-weight: 600; color: var(--color-text-primary); }
.section-spacer { flex: 1; }
.view-all { font-size: 13px; color: var(--color-primary); cursor: pointer; text-decoration: none; font-weight: 500; }
.view-all:hover { text-decoration: underline; }

/* ========== TAB BAR ========== */
.tab-bar { display: flex; gap: 4px; background: var(--color-bg); border: 1px solid var(--color-border); border-radius: var(--radius-md); padding: 3px; margin-bottom: 20px; width: fit-content; }
.tab-item { padding: 6px 16px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; color: var(--color-text-secondary); cursor: pointer; transition: var(--transition); border: none; background: none; font-family: var(--font); }
.tab-item.active { background: var(--color-surface); color: var(--color-text-primary); box-shadow: var(--shadow-sm); }
.tab-item:not(.active):hover { color: var(--color-text-primary); }

/* ========== BOARD GRID ========== */
.boards-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; }
.board-card {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  cursor: pointer;
  transition: var(--transition);
  box-shadow: var(--shadow-sm);
}
.board-card:hover { box-shadow: var(--shadow-lg); transform: translateY(-3px); border-color: var(--color-primary); }
.board-thumb {
  height: 140px;
  position: relative;
  overflow: hidden;
  background: var(--color-bg);
}
.board-thumb-content { width: 100%; height: 100%; display: flex; flex-direction: column; padding: 10px; gap: 6px; }
.board-thumb-row { display: flex; gap: 6px; flex: 1; }
.thumb-block { border-radius: 4px; flex: 1; }
.board-thumb-bar { height: 6px; border-radius: 3px; background: var(--color-border); overflow: hidden; }
.board-thumb-bar-fill { height: 100%; border-radius: 3px; }
.board-tag {
  position: absolute; top: 10px; right: 10px;
  font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 5px;
}
.board-tag.shared { background: rgba(79,110,247,.15); color: var(--color-primary); }
.board-tag.personal { background: rgba(107,122,153,.12); color: var(--color-text-secondary); }
.board-info { padding: 14px 16px 16px; }
.board-name { font-size: 14px; font-weight: 600; color: var(--color-text-primary); margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.board-meta { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 12px; }
.board-footer { display: flex; align-items: center; justify-content: space-between; }
.board-avatars { display: flex; }
.board-avatar {
  width: 22px; height: 22px; border-radius: 50%;
  background: linear-gradient(135deg, var(--color-primary), var(--color-accent));
  border: 2px solid var(--color-surface);
  margin-left: -6px; display: flex; align-items: center; justify-content: center;
  font-size: 9px; font-weight: 700; color: #fff;
}
.board-avatar:first-child { margin-left: 0; }
.board-actions { display: flex; gap: 4px; }
.board-action-btn {
  width: 28px; height: 28px; border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  color: var(--color-text-secondary); border: none; background: transparent;
  cursor: pointer; transition: var(--transition);
}
.board-action-btn:hover { background: var(--color-bg); color: var(--color-text-primary); }

/* NEW BOARD CARD */
.board-card-new {
  background: transparent;
  border: 2px dashed var(--color-border);
  border-radius: var(--radius-lg);
  min-height: 230px;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px;
  cursor: pointer; transition: var(--transition); color: var(--color-text-secondary);
}
.board-card-new:hover { border-color: var(--color-primary); color: var(--color-primary); background: var(--color-primary-light); }
.new-icon { width: 44px; height: 44px; border-radius: 50%; background: var(--color-border); display: flex; align-items: center; justify-content: center; transition: var(--transition); }
.board-card-new:hover .new-icon { background: rgba(79,110,247,.2); }
.new-label { font-size: 13px; font-weight: 500; }

/* ========== SCROLLBAR ========== */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--color-border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #c5cce0; }
</style>
</head>
