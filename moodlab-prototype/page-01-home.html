<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>首页 — MoodLab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-primary:       #7C6FFF;
      --color-primary-hover: #6558F0;
      --color-primary-light: rgba(124,111,255,0.12);
      --color-primary-fg:    #FFFFFF;
      --color-bg:            #FAF9FF;
      --color-surface:       #FFFFFF;
      --color-surface-2:     #F3F0FF;
      --color-border:        #E8E4F3;
      --color-border-light:  #D8D3EE;
      --color-muted:         #8E88A8;
      --color-foreground:    #1A1730;
      --color-success:       #4ECBA0; --color-success-bg:#EDFAF4;
      --color-warning:       #FFAB40; --color-warning-bg:#FFF8EC;
      --color-error:         #FF6B6B; --color-error-bg:#FFF0F0;
      /* 情绪色 */
      --mood-happy:   #FFD166; --mood-happy-bg:   #FFFBEE;
      --mood-calm:    #74D7E8; --mood-calm-bg:    #EDF9FC;
      --mood-sad:     #7C9CF5; --mood-sad-bg:     #EEF3FF;
      --mood-anxious: #C084FC; --mood-anxious-bg: #FAF0FF;
      --mood-angry:   #FC8181; --mood-angry-bg:   #FFF1F1;
      --mood-tired:   #94A3B8; --mood-tired-bg:   #F1F5F9;
      --font-sans:    'Nunito', system-ui, sans-serif;
      --font-weight-regular:400; --font-weight-medium:500;
      --font-weight-semibold:600; --font-weight-bold:700; --font-weight-extrabold:800;
      --text-xs:11px; --text-sm:13px; --text-base:15px; --text-md:16px;
      --text-lg:18px; --text-xl:20px; --text-2xl:24px;
      --space-1:4px; --space-2:8px; --space-3:12px; --space-4:16px;
      --space-5:20px; --space-6:24px; --space-8:32px;
      --radius-xs:4px; --radius-sm:8px; --radius-md:12px; --radius-lg:16px;
      --radius-xl:22px; --radius-2xl:32px; --radius-full:9999px;
      --shadow-xs:0 1px 3px rgba(124,111,255,0.06);
      --shadow-sm:0 2px 8px rgba(124,111,255,0.10);
      --shadow-md:0 4px 16px rgba(124,111,255,0.14);
      --shadow-lg:0 8px 28px rgba(124,111,255,0.18);
      --duration-base:200ms; --duration-slow:350ms;
      --ease-default:cubic-bezier(0.4,0,0.2,1);
      --ease-spring:cubic-bezier(0.34,1.56,0.64,1);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html,body{width:100%;height:100%;}
    body{
      font-family:var(--font-sans);
      background:var(--color-bg);
      color:var(--color-foreground);
      line-height:1.5;
      -webkit-font-smoothing:antialiased;
      /* 模拟手机壳 */
      width:390px;
      min-height:844px;
      margin:0 auto;
      display:flex;
      flex-direction:column;
      overflow-x:hidden;
      position:relative;
    }
    a{color:inherit;text-decoration:none;}
    button{cursor:pointer;font-family:inherit;border:none;background:none;}

    /* ─── TOP STATUS BAR ─── */
    .status-bar{
      height:44px;
      display:flex;align-items:center;justify-content:space-between;
      padding:0 var(--space-5);
      flex-shrink:0;
    }
    .status-time{font-size:15px;font-weight:var(--font-weight-bold);}
    .status-icons{display:flex;align-items:center;gap:6px;font-size:13px;}

    /* ─── TOP NAV ─── */
    .topnav{
      padding:0 var(--space-5) var(--space-4);
      display:flex;align-items:center;justify-content:space-between;
      flex-shrink:0;
    }
    .greeting-date{font-size:var(--text-xs);color:var(--color-muted);margin-bottom:2px;}
    .greeting-text{font-size:var(--text-xl);font-weight:var(--font-weight-extrabold);}
    .greeting-text span{color:var(--color-primary);}
    .topnav-actions{display:flex;gap:var(--space-3);align-items:center;}
    .icon-btn{
      width:40px;height:40px;border-radius:var(--radius-full);
      background:var(--color-surface);border:1px solid var(--color-border);
      display:flex;align-items:center;justify-content:center;
      font-size:18px;cursor:pointer;
      transition:all var(--duration-base) var(--ease-default);
      box-shadow:var(--shadow-xs);
    }
    .icon-btn:hover{background:var(--color-primary-light);}
    .notif-dot{position:relative;}
    .notif-dot::after{
      content:'';position:absolute;top:8px;right:8px;
      width:7px;height:7px;border-radius:50%;
      background:var(--color-error);border:2px solid var(--color-bg);
    }

    /* ─── STREAK BANNER ─── */
    .streak-banner{
      margin:0 var(--space-5) var(--space-5);
      background:linear-gradient(135deg,#7C6FFF,#9F8FFF);
      border-radius:var(--radius-xl);
      padding:var(--space-4) var(--space-5);
      display:flex;align-items:center;justify-content:space-between;
      box-shadow:var(--shadow-md);
    }
    .streak-left{}
    .streak-label{font-size:var(--text-xs);color:rgba(255,255,255,0.75);margin-bottom:2px;}
    .streak-val{font-size:var(--text-2xl);font-weight:var(--font-weight-extrabold);color:#fff;}
    .streak-val span{font-size:var(--text-base);font-weight:var(--font-weight-medium);}
    .streak-right{font-size:44px;line-height:1;}
    .streak-subs{display:flex;gap:var(--space-4);margin-top:var(--space-3);}
    .streak-sub{text-align:center;}
    .streak-sub-val{font-size:var(--text-lg);font-weight:var(--font-weight-bold);color:#fff;}
    .streak-sub-label{font-size:10px;color:rgba(255,255,255,0.65);}

    /* ─── MONTH HEADER ─── */
    .month-header{
      padding:0 var(--space-5) var(--space-3);
      display:flex;align-items:center;justify-content:space-between;
    }
    .month-title{font-size:var(--text-lg);font-weight:var(--font-weight-bold);}
    .month-nav{display:flex;gap:var(--space-2);align-items:center;}
    .month-nav-btn{
      width:32px;height:32px;border-radius:var(--radius-full);
      background:var(--color-surface);border:1px solid var(--color-border);
      display:flex;align-items:center;justify-content:center;
      font-size:14px;cursor:pointer;transition:all var(--duration-base);
    }
    .month-nav-btn:hover{background:var(--color-primary-light);border-color:var(--color-primary);}

    /* ─── CALENDAR ─── */
    .calendar-wrap{padding:0 var(--space-5) var(--space-5);}
    .cal-weekdays{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:var(--space-2);}
    .cal-wd{text-align:center;font-size:var(--text-xs);font-weight:var(--font-weight-semibold);color:var(--color-muted);padding:var(--space-2) 0;}
    .cal-days{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
    .cal-day{
      aspect-ratio:1;border-radius:var(--radius-md);
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      cursor:pointer;transition:all var(--duration-base) var(--ease-default);
      position:relative;font-size:var(--text-sm);font-weight:var(--font-weight-semibold);
    }
    .cal-day:hover{background:var(--color-surface);}
    .cal-day.other-month{color:var(--color-border-light);}
    .cal-day.today{
      background:var(--color-primary);color:#fff;
      box-shadow:var(--shadow-sm);
    }
    .cal-day.today .cal-mood-dot{border-color:var(--color-primary);}
    .cal-day.has-mood{background:var(--color-surface);}
    .cal-day.selected{
      border:2px solid var(--color-primary);
      background:var(--color-primary-light);
    }
    .cal-mood-dot{
      width:18px;height:18px;border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      font-size:11px;margin-top:1px;
    }
    .cal-day-num{font-size:11px;line-height:1;}
    .cal-empty-ring{
      width:14px;height:14px;border-radius:50%;
      border:1.5px dashed var(--color-border-light);
      margin-top:2px;
    }

    /* ─── QUICK INSIGHT ─── */
    .section-title{
      padding:0 var(--space-5) var(--space-3);
      font-size:var(--text-base);font-weight:var(--font-weight-bold);
      display:flex;align-items:center;justify-content:space-between;
    }
    .section-more{font-size:var(--text-xs);color:var(--color-primary);font-weight:var(--font-weight-semibold);}
    .insights-row{
      padding:0 var(--space-5) var(--space-5);
      display:flex;gap:var(--space-3);
    }
    .insight-card{
      flex:1;background:var(--color-surface);
      border:1px solid var(--color-border);
      border-radius:var(--radius-lg);
      padding:var(--space-4);
      box-shadow:var(--shadow-xs);
    }
    .insight-icon{font-size:22px;margin-bottom:var(--space-2);}
    .insight-val{font-size:var(--text-xl);font-weight:var(--font-weight-extrabold);color:var(--color-foreground);}
    .insight-label{font-size:var(--text-xs);color:var(--color-muted);margin-top:2px;}

    /* ─── TODAY ENTRY ─── */
    .today-section{padding:0 var(--space-5) var(--space-5);}
    .today-empty{
      background:linear-gradient(135deg,#F3F0FF,#FAF0FF);
      border:1.5px dashed var(--color-primary);
      border-radius:var(--radius-xl);
      padding:var(--space-8) var(--space-5);
      text-align:center;
    }
    .today-empty-illus{font-size:48px;margin-bottom:var(--space-4);display:block;}
    .today-empty-title{font-size:var(--text-lg);font-weight:var(--font-weight-bold);margin-bottom:var(--space-2);}
    .today-empty-sub{font-size:var(--text-sm);color:var(--color-muted);line-height:1.6;margin-bottom:var(--space-5);}
    .btn-record{
      display:inline-flex;align-items:center;gap:var(--space-2);
      padding:var(--space-3) var(--space-6);
      background:var(--color-primary);color:#fff;
      border-radius:var(--radius-full);
      font-size:var(--text-base);font-weight:var(--font-weight-bold);
      box-shadow:var(--shadow-md);
      transition:all var(--duration-base) var(--ease-default);
    }
    .btn-record:hover{background:var(--color-primary-hover);transform:scale(1.02);}

    /* ─── RECENT ENTRIES ─── */
    .entries-list{
      padding:0 var(--space-5) var(--space-5);
      display:flex;flex-direction:column;gap:var(--space-3);
    }
    .entry-card{
      background:var(--color-surface);
      border:1px solid var(--color-border);
      border-radius:var(--radius-xl);
      padding:var(--space-4) var(--space-5);
      display:flex;gap:var(--space-4);align-items:flex-start;
      box-shadow:var(--shadow-xs);
      cursor:pointer;
      transition:all var(--duration-base) var(--ease-default);
      overflow:hidden;
      position:relative;
    }
    .entry-card::before{
      content:'';position:absolute;left:0;top:0;bottom:0;
      width:4px;border-radius:4px 0 0 4px;
    }
    .entry-card.happy::before{background:var(--mood-happy);}
    .entry-card.calm::before{background:var(--mood-calm);}
    .entry-card.sad::before{background:var(--mood-sad);}
    .entry-card.anxious::before{background:var(--mood-anxious);}
    .entry-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-sm);}
    .entry-emoji{font-size:32px;flex-shrink:0;line-height:1;}
    .entry-body{flex:1;min-width:0;}
    .entry-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
    .entry-mood{font-size:var(--text-sm);font-weight:var(--font-weight-bold);}
    .entry-time{font-size:var(--text-xs);color:var(--color-muted);}
    .entry-text{font-size:var(--text-sm);color:var(--color-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .entry-intensity{
      display:inline-flex;align-items:center;gap:3px;
      padding:2px 8px;
      background:var(--color-surface-2);
      border-radius:var(--radius-full);
      font-size:10px;font-weight:var(--font-weight-semibold);
      color:var(--color-primary);
      margin-top:var(--space-2);
    }

    /* ─── BOTTOM TAB BAR ─── */
    .tabbar{
      position:sticky;bottom:0;
      height:64px;
      background:var(--color-surface);
      border-top:1px solid var(--color-border);
      display:flex;align-items:center;
      padding:0 var(--space-4);
      padding-bottom:env(safe-area-inset-bottom);
      box-shadow:0 -4px 20px rgba(124,111,255,0.08);
      flex-shrink:0;
      z-index:100;
    }
    .tab-item{
      flex:1;display:flex;flex-direction:column;align-items:center;
      gap:3px;padding:8px 0;cursor:pointer;
      font-size:10px;color:var(--color-muted);
      transition:color var(--duration-base);
      min-height:44px;
    }
    .tab-item.active{color:var(--color-primary);}
    .tab-icon{font-size:22px;line-height:1;}

    /* ─── FAB ─── */
    .tab-fab{
      flex-shrink:0;width:56px;height:56px;
      border-radius:var(--radius-full);
      background:linear-gradient(135deg,#7C6FFF,#9F8FFF);
      display:flex;align-items:center;justify-content:center;
      font-size:28px;color:#fff;
      box-shadow:var(--shadow-lg);
      cursor:pointer;
      margin-top:-28px;
      transition:all var(--duration-base) var(--ease-spring);
      flex-direction:column;
    }
    .tab-fab:hover{transform:scale(1.08);box-shadow:0 12px 32px rgba(124,111,255,0.4);}
    .tab-fab:active{transform:scale(0.95);}

    /* ─── SLIDE-IN DETAIL ─── */
    .detail-overlay{
      position:fixed;inset:0;background:rgba(26,23,48,0.45);
      z-index:300;opacity:0;pointer-events:none;
      transition:opacity var(--duration-slow) var(--ease-default);
    }
    .detail-overlay.open{opacity:1;pointer-events:all;}
    .detail-panel{
      position:fixed;top:0;right:0;bottom:0;
      width:320px;background:var(--color-bg);
      transform:translateX(100%);
      transition:transform var(--duration-slow) var(--ease-default);
      z-index:301;border-radius:var(--radius-xl) 0 0 var(--radius-xl);
      overflow-y:auto;padding:var(--space-6) var(--space-5);
      box-shadow:-8px 0 32px rgba(0,0,0,0.15);
    }
    .detail-panel.open{transform:translateX(0);}
    .detail-close{
      display:flex;align-items:center;justify-content:space-between;
      margin-bottom:var(--space-5);
    }
    .detail-date{font-size:var(--text-lg);font-weight:var(--font-weight-bold);}
    .detail-body{font-size:var(--text-sm);color:var(--color-muted);line-height:1.7;}
    .detail-mood-badge{
      display:inline-flex;align-items:center;gap:var(--space-2);
      padding:var(--space-2) var(--space-4);
      background:var(--color-primary-light);border-radius:var(--radius-full);
      font-size:var(--text-base);font-weight:var(--font-weight-bold);
      color:var(--color-primary);margin-bottom:var(--space-4);
    }
    .detail-content-box{
      background:var(--color-surface);border:1px solid var(--color-border);
      border-radius:var(--radius-lg);padding:var(--space-4);margin-top:var(--space-4);
      font-size:var(--text-sm);color:var(--color-foreground);line-height:1.7;
    }

    /* TOAST */
    .toast-ct{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:2000;pointer-events:none;display:flex;flex-direction:column;align-items:center;gap:var(--space-2);}
    .toast{background:rgba(26,23,48,0.9);color:#fff;padding:var(--space-2) var(--space-5);border-radius:var(--radius-full);font-size:var(--text-sm);font-weight:var(--font-weight-semibold);white-space:nowrap;opacity:0;transform:translateY(8px);transition:all 0.25s var(--ease-spring);}
    .toast.show{opacity:1;transform:translateY(0);}
  </style>
</head>

<!-- STATUS BAR -->
<div class="status-bar">
  <span class="status-time">9:41</span>
  <span class="status-icons">📶 🛜 🔋</span>

  </div>
  <div style="margin-top:var(--space-4);display:flex;gap:var(--space-3);">
    <button style="flex:1;padding:var(--space-3) 0;background:var(--color-surface-2);border:1px solid var(--color-border);border-radius:var(--radius-full);font-size:var(--text-sm);font-weight:var(--font-weight-semibold);font-family:var(--font-sans);cursor:pointer;" onclick="showToast('编辑记录')">✎ 编辑</button>
    <button style="flex:1;padding:var(--space-3) 0;background:var(--color-primary);color:#fff;border-radius:var(--radius-full);font-size:var(--text-sm);font-weight:var(--font-weight-semibold);font-family:var(--font-sans);cursor:pointer;" onclick="showToast('查看AI分析')">✦ AI分析</button>
  </div>
</div>

<div class="toast-ct" id="toast-ct"></div>

<script>
  // ── 日历渲染 ──
  const MOODS = [
    {day:1,emoji:'😊',cls:'happy'},{day:2,emoji:'😌',cls:'calm'},{day:3,emoji:'😔',cls:'sad'},
    {day:5,emoji:'😤',cls:'anxious'},{day:6,emoji:'😊',cls:'happy'},{day:7,emoji:'😴',cls:'tired'},
    {day:8,emoji:'😊',cls:'happy'},{day:9,emoji:'😌',cls:'calm'},{day:10,emoji:'😊',cls:'happy'},
    {day:12,emoji:'😔',cls:'sad'},{day:13,emoji:'😌',cls:'calm'},{day:14,emoji:'😊',cls:'happy'},
    {day:15,emoji:'😤',cls:'anxious'},{day:16,emoji:'😊',cls:'happy'},{day:17,emoji:'😌',cls:'calm'},
    {day:19,emoji:'😊',cls:'happy'},{day:20,emoji:'😊',cls:'happy'},{day:21,emoji:'😴',cls:'tired'},
    {day:22,emoji:'😌',cls:'calm'},{day:23,emoji:'😊',cls:'happy'},{day:24,emoji:'😌',cls:'calm'},
    {day:26,emoji:'😔',cls:'sad'},{day:27,emoji:'😌',cls:'calm'},{day:28,emoji:'😌',cls:'calm'},
    {day:29,emoji:'😊',cls:'happy'},{day:30,emoji:'😊',cls:'happy'}
  ];
  const moodMap = {};
  MOODS.forEach(m=>moodMap[m.day]=m);

  function renderCalendar() {
    const container = document.getElementById('cal-days');
    const year=2026, month=2; // 0-indexed March
    const firstDay = new Date(year,month,1).getDay();
    const daysInMonth = new Date(year,month+1,0).getDate();
    let html = '';
    for(let i=0;i<firstDay;i++){
      const prevDay = new Date(year,month,0-firstDay+i+2).getDate();
      html += `<div class="cal-day other-month"><div class="cal-day-num">${prevDay}</div></div>`;
    }
    for(let d=1;d<=daysInMonth;d++){
      const isToday = d===31;
      const mood = moodMap[d];
      let cls = 'cal-day';
      if(isToday) cls+=' today';
      else if(mood) cls+=' has-mood '+mood.cls;
      const inner = mood
        ? `<div class="cal-day-num">${d}</div><div class="cal-mood-dot">${mood.emoji}</div>`
        : isToday
          ? `<div class="cal-day-num">${d}</div><div class="cal-mood-dot" style="font-size:9px;color:rgba(255,255,255,0.7);">?</div>`
          : `<div class="cal-day-num">${d}</div><div class="cal-empty-ring"></div>`;
      html += `<div class="${cls}" onclick="calClick(${d},${isToday})" title="${d}日">${inner}</div>`;
    }
    container.innerHTML = html;
  }

  function calClick(d, isToday) {
    if(isToday){ location.href='page-02-emotion-select.html'; return; }
    const mood = moodMap[d];
    if(mood){
      const moodNames = {happy:'快乐',calm:'平静',sad:'悲伤',anxious:'焦虑',tired:'疲惫'};
      const moodEmojis = {happy:'😊',calm:'😌',sad:'😔',anxious:'😤',tired:'😴'};
      document.getElementById('detail-date').textContent = `3月${d}日`;
      document.getElementById('detail-mood-badge').innerHTML = `${moodEmojis[mood.cls]} ${moodNames[mood.cls]}`;
      document.getElementById('detail-overlay').classList.add('open');
      document.getElementById('detail-panel').classList.add('open');
    } else {
      showToast(`${d}日还没有记录，长按可补记`);
    }
  }
  function closeDetail(){
    document.getElementById('detail-overlay').classList.remove('open');
    document.getElementById('detail-panel').classList.remove('open');
  }

  // ── 近期记录 ──
  const recentEntries = [
    {emoji:'😊',mood:'快乐',cls:'happy',time:'今天 08:30',text:'早起跑步，状态超好！感觉今天会是美好的一天。',intensity:7},
    {emoji:'😌',mood:'平静',cls:'calm',time:'昨天 22:14',text:'今天工作不是很忙，下班后去楼下买了杯咖啡，坐在河边看了一会儿夕阳。',intensity:4},
    {emoji:'😔',mood:'悲伤',cls:'sad',time:'3月28日',text:'和朋友聊了聊最近的事，有些沉重，但说出来反而轻松了一点。',intensity:5},
    {emoji:'😤',mood:'焦虑',cls:'anxious',time:'3月27日',text:'明天要开的那个会让我睡不着，脑子一直转。',intensity:6},
  ];
  function renderEntries(){
    document.getElementById('entries-list').innerHTML = recentEntries.map(e=>`
      <div class="entry-card ${e.cls}" onclick="showToast('查看${e.time}的记录')" title="查看详情">
        <div class="entry-emoji">${e.emoji}</div>
        <div class="entry-body">
          <div class="entry-header">
            <span class="entry-mood">${e.mood}</span>
            <span class="entry-time">${e.time}</span>
          </div>
          <div class="entry-text">${e.text}</div>
          <div class="entry-intensity">⚡ 强度 ${e.intensity}/10</div>
        </div>
      </div>`).join('');
  }

  function showToast(msg){
    const c=document.getElementById('toast-ct');
    const t=document.createElement('div'); t.className='toast'; t.textContent=msg; c.appendChild(t);
    requestAnimationFrame(()=>requestAnimationFrame(()=>t.classList.add('show')));
    setTimeout(()=>{t.classList.remove('show');setTimeout(()=>t.remove(),300);},2500);
  }

  renderCalendar();
  renderEntries();
  document.getElementById('today-empty-section').style.display='none'; // 今日已有记录时隐藏
</script>
</body>
</html>
