<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>记录内容 — MoodLab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-primary:#7C6FFF; --color-primary-hover:#6558F0;
      --color-primary-light:rgba(124,111,255,0.12); --color-primary-fg:#FFFFFF;
      --color-bg:#FAF9FF; --color-surface:#FFFFFF; --color-surface-2:#F3F0FF;
      --color-border:#E8E4F3; --color-border-focus:#7C6FFF;
      --color-muted:#8E88A8; --color-foreground:#1A1730;
      --color-error:#FF6B6B;
      --font-sans:'Nunito',system-ui,sans-serif;
      --font-weight-regular:400; --font-weight-medium:500;
      --font-weight-semibold:600; --font-weight-bold:700; --font-weight-extrabold:800;
      --text-xs:11px; --text-sm:13px; --text-base:15px; --text-md:16px;
      --text-lg:18px; --text-xl:20px; --text-2xl:24px;
      --space-1:4px; --space-2:8px; --space-3:12px; --space-4:16px;
      --space-5:20px; --space-6:24px; --space-8:32px;
      --radius-sm:8px; --radius-md:12px; --radius-lg:16px;
      --radius-xl:22px; --radius-full:9999px;
      --shadow-xs:0 1px 3px rgba(124,111,255,0.06);
      --shadow-sm:0 2px 8px rgba(124,111,255,0.10);
      --shadow-md:0 4px 16px rgba(124,111,255,0.14);
      --shadow-lg:0 8px 28px rgba(124,111,255,0.22);
      --duration-base:200ms; --duration-slow:350ms;
      --ease-default:cubic-bezier(0.4,0,0.2,1);
      --ease-spring:cubic-bezier(0.34,1.56,0.64,1);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html,body{width:100%;}
    body{
      font-family:var(--font-sans);
      background:var(--color-bg);
      color:var(--color-foreground);
      line-height:1.5;
      -webkit-font-smoothing:antialiased;
      width:390px; min-height:844px;
      margin:0 auto;
      display:flex; flex-direction:column;
      overflow-x:hidden;
    }

    /* STATUS BAR */
    .status-bar{height:44px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;flex-shrink:0;}
    .status-time{font-size:15px;font-weight:700;}
    .status-icons{font-size:13px;}

    /* TOP NAV */
    .page-nav{
      padding:0 var(--space-5) var(--space-4);
      display:flex;align-items:center;justify-content:space-between;
      flex-shrink:0;
    }
    .back-btn{width:40px;height:40px;border-radius:var(--radius-full);background:var(--color-surface);border:1px solid var(--color-border);display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;transition:all var(--duration-base);box-shadow:var(--shadow-xs);}
    .back-btn:hover{background:var(--color-primary-light);}
    .nav-title{font-size:var(--text-base);font-weight:var(--font-weight-bold);}
    .done-btn{
      padding:8px 18px;
      background:var(--color-primary);color:#fff;
      border-radius:var(--radius-full);
      font-family:var(--font-sans);font-size:var(--text-sm);font-weight:var(--font-weight-bold);
      border:none;cursor:pointer;
      box-shadow:var(--shadow-sm);
      transition:all var(--duration-base) var(--ease-spring);
    }
    .done-btn:hover{background:var(--color-primary-hover);transform:scale(1.03);}
    .done-btn:active{transform:scale(0.97);}

    /* MOOD HEADER BADGE */
    .mood-badge-wrap{padding:0 var(--space-5) var(--space-4);flex-shrink:0;}
    .mood-badge{
      display:flex;align-items:center;gap:var(--space-3);
      background:var(--color-surface);
      border:1px solid var(--color-border);
      border-radius:var(--radius-xl);
      padding:var(--space-3) var(--space-4);
      box-shadow:var(--shadow-xs);
    }
    .mood-badge-emoji{font-size:32px;line-height:1;}
    .mood-badge-info{}
    .mood-badge-name{font-size:var(--text-base);font-weight:var(--font-weight-bold);}
    .mood-badge-intensity{font-size:var(--text-xs);color:var(--color-muted);}
    .mood-badge-change{margin-left:auto;font-size:var(--text-xs);color:var(--color-primary);font-weight:var(--font-weight-semibold);cursor:pointer;padding:4px 10px;border-radius:var(--radius-full);background:var(--color-primary-light);transition:all var(--duration-base);}
    .mood-badge-change:hover{background:var(--color-primary);color:#fff;}

    /* AI GUIDE */
    .ai-guide{
      margin:0 var(--space-5) var(--space-4);
      background:linear-gradient(135deg,var(--color-primary-light),rgba(159,143,255,0.10));
      border:1px solid rgba(124,111,255,0.2);
      border-radius:var(--radius-xl);
      padding:var(--space-4);
      display:flex;gap:var(--space-3);align-items:flex-start;
      flex-shrink:0;
    }
    .ai-guide-icon{font-size:22px;flex-shrink:0;line-height:1;}
    .ai-guide-text{font-size:var(--text-sm);color:var(--color-foreground);line-height:1.6;}
    .ai-guide-label{font-size:10px;font-weight:var(--font-weight-bold);color:var(--color-primary);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:3px;}

    /* INPUT AREA */
    .input-area{
      flex:1;
      padding:0 var(--space-5);
      display:flex;flex-direction:column;gap:var(--space-4);
    }
    .main-textarea{
      flex:1;min-height:160px;
      padding:var(--space-4);
      background:var(--color-surface);
      border:1.5px solid var(--color-border);
      border-radius:var(--radius-xl);
      font-family:var(--font-sans);
      font-size:var(--text-base);
      color:var(--color-foreground);
      line-height:1.7;resize:none;
      transition:border-color var(--duration-base),box-shadow var(--duration-base);
      box-shadow:var(--shadow-xs);
    }
    .main-textarea::placeholder{color:var(--color-muted);opacity:0.7;}
    .main-textarea:focus{
      outline:none;
      border-color:var(--color-border-focus);
      box-shadow:0 0 0 4px var(--color-primary-light);
    }
    .char-counter{
      text-align:right;font-size:var(--text-xs);color:var(--color-muted);
      font-variant-numeric:tabular-nums;
      transition:color var(--duration-base);
    }
    .char-counter.warn{color:var(--color-error);}

    /* TOOL BAR */
    .toolbar{
      display:flex;align-items:center;gap:var(--space-3);
      padding:var(--space-3) var(--space-4);
      background:var(--color-surface);
      border:1px solid var(--color-border);
      border-radius:var(--radius-xl);
      box-shadow:var(--shadow-xs);
    }
    .tool-btn{
      display:flex;flex-direction:column;align-items:center;gap:3px;
      flex:1;padding:var(--space-2) 0;
      cursor:pointer;border-radius:var(--radius-md);
      transition:all var(--duration-base);
    }
    .tool-btn:hover{background:var(--color-surface-2);}
    .tool-btn.active{background:var(--color-primary-light);}
    .tool-icon{font-size:22px;line-height:1;}
    .tool-label{font-size:10px;color:var(--color-muted);font-weight:var(--font-weight-semibold);}
    .tool-btn.active .tool-label{color:var(--color-primary);}

    /* PHOTO PREVIEW */
    .photo-preview{
      display:flex;gap:var(--space-3);
      padding:0;
    }
    .photo-thumb{
      width:80px;height:80px;border-radius:var(--radius-lg);
      background:var(--color-surface-2);border:1.5px solid var(--color-border);
      display:flex;align-items:center;justify-content:center;font-size:28px;
      position:relative;cursor:pointer;overflow:hidden;
      transition:all var(--duration-base);
      flex-shrink:0;
    }
    .photo-thumb:hover{border-color:var(--color-primary);}
    .photo-thumb-del{
      position:absolute;top:4px;right:4px;width:18px;height:18px;
      border-radius:50%;background:rgba(0,0,0,0.5);color:#fff;
      display:flex;align-items:center;justify-content:center;font-size:11px;
      cursor:pointer;
    }
    .photo-add{
      width:80px;height:80px;border-radius:var(--radius-lg);
      border:1.5px dashed var(--color-primary);
      background:var(--color-primary-light);
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:3px;cursor:pointer;flex-shrink:0;
      transition:all var(--duration-base);
    }
    .photo-add:hover{background:rgba(124,111,255,0.2);}
    .photo-add-icon{font-size:22px;color:var(--color-primary);}
    .photo-add-label{font-size:10px;color:var(--color-primary);font-weight:var(--font-weight-bold);}

    /* VOICE RECORDING */
    .voice-panel{
      background:var(--color-surface);border:1px solid var(--color-border);
      border-radius:var(--radius-xl);padding:var(--space-4);
      display:flex;flex-direction:column;align-items:center;gap:var(--space-3);
    }
    .voice-btn{
      width:72px;height:72px;border-radius:var(--radius-full);
      background:linear-gradient(135deg,#7C6FFF,#9F8FFF);
      border:none;color:#fff;font-size:28px;
      cursor:pointer;box-shadow:var(--shadow-md);
      display:flex;align-items:center;justify-content:center;
      transition:all var(--duration-base) var(--ease-spring);
      position:relative;
    }
    .voice-btn.recording{animation:pulse-ring 1.5s ease-out infinite;}
    @keyframes pulse-ring{
      0%{box-shadow:0 0 0 0 rgba(124,111,255,0.4);}
      70%{box-shadow:0 0 0 16px rgba(124,111,255,0);}
      100%{box-shadow:0 0 0 0 rgba(124,111,255,0);}
    }
    .voice-time{font-size:var(--text-lg);font-weight:var(--font-weight-bold);color:var(--color-primary);font-variant-numeric:tabular-nums;}
    .voice-hint{font-size:var(--text-xs);color:var(--color-muted);}

    /* BOTTOM SAVE */
    .save-area{
      padding:var(--space-4) var(--space-5);
      padding-bottom:calc(var(--space-4) + env(safe-area-inset-bottom));
      flex-shrink:0;
      border-top:1px solid var(--color-border);
      background:var(--color-surface);
    }
    .btn-save{
      width:100%;height:52px;
      background:linear-gradient(135deg,#7C6FFF,#9F8FFF);
      color:#fff;border:none;border-radius:var(--radius-full);
      font-family:var(--font-sans);font-size:var(--text-md);font-weight:var(--font-weight-bold);
      cursor:pointer;box-shadow:var(--shadow-md);
      display:flex;align-items:center;justify-content:center;gap:var(--space-2);
      transition:all var(--duration-base) var(--ease-spring);
    }
    .btn-save:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg);}
    .btn-save:active{transform:scale(0.97);}
    .btn-save:disabled{opacity:0.45;pointer-events:none;}

    /* MODE PANELS */
    .mode-panel{display:none;}
    .mode-panel.active{display:flex;flex-direction:column;gap:var(--space-3);}

    /* TOAST */
    .toast-ct{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:2000;pointer-events:none;display:flex;flex-direction:column;align-items:center;gap:var(--space-2);}
    .toast{background:rgba(26,23,48,0.9);color:#fff;padding:var(--space-2) var(--space-5);border-radius:var(--radius-full);font-size:var(--text-sm);font-weight:var(--font-weight-semibold);white-space:nowrap;opacity:0;transform:translateY(8px);transition:all 0.25s var(--ease-spring);}
    .toast.show{opacity:1;transform:translateY(0);}
  </style>
</head>
<body>

<!-- STATUS BAR -->
<div class="status-bar">
  <span class="status-time">9:41</span>
  <span class="status-icons">📶 🛜 🔋</span>
</div>

<!-- TOP NAV -->
<div class="page-nav">
  <button class="back-btn" onclick="history.back()" title="返回" aria-label="返回">←</button>
  <span class="nav-title">记录此刻</span>
  <button class="done-btn" onclick="saveRecord()" id="done-btn" title="完成并保存" aria-label="完成">完成</button>
</div>

<!-- MOOD BADGE -->
<div class="mood-badge-wrap">
  <div class="mood-badge">
    <span class="mood-badge-emoji" id="badge-emoji">😊</span>
    <div class="mood-badge-info">
      <div class="mood-badge-name" id="badge-name">快乐</div>
      <div class="mood-badge-intensity" id="badge-intensity">强度 7/10</div>
    </div>
    <div class="mood-badge-change" onclick="history.back()" title="重新选择情绪">← 重选</div>
  </div>
</div>

<!-- AI GUIDE QUESTION -->
<div class="ai-guide">
  <span class="ai-guide-icon">✦</span>
  <div>
    <div class="ai-guide-label">AI 引导问题</div>
    <div class="ai-guide-text" id="ai-guide-text">今天发生了什么让你感到这么开心的事情？试着把它写下来吧 🌟</div>
  </div>
</div>

<!-- INPUT AREA -->
<div class="input-area">
  <!-- TEXT MODE -->
  <div class="mode-panel active" id="panel-text">
    <textarea class="main-textarea" id="main-input" placeholder="写下你的心情…让文字陪伴你此刻的感受" maxlength="5000" oninput="updateCharCount()" aria-label="情绪记录内容"></textarea>
    <div style="display:flex;justify-content:space-between;align-items:center;">
      <div style="font-size:var(--text-xs);color:var(--color-muted);">最多 5000 字</div>
      <div class="char-counter" id="char-counter">0 / 5000</div>
    </div>
  </div>

  <!-- VOICE MODE -->
  <div class="mode-panel" id="panel-voice">
    <div class="voice-panel">
      <button class="voice-btn" id="voice-btn" onclick="toggleVoice()" aria-label="开始/停止录音">🎙️</button>
      <div class="voice-time" id="voice-time">00:00</div>
      <div class="voice-hint" id="voice-hint">点击麦克风开始录音（最长3分钟）</div>
    </div>
    <!-- 转写结果 -->
    <div id="transcription-area" style="display:none;">
      <div style="font-size:var(--text-xs);font-weight:var(--font-weight-bold);color:var(--color-primary);margin-bottom:var(--space-2);">✦ 转写结果</div>
      <div style="background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-lg);padding:var(--space-4);font-size:var(--text-sm);color:var(--color-foreground);line-height:1.7;" id="transcription-text"></div>
    </div>
  </div>

  <!-- PHOTO MODE -->
  <div class="mode-panel" id="panel-photo">
    <div class="photo-preview" id="photo-preview">
      <div class="photo-add" onclick="addPhoto()" title="添加图片" aria-label="添加图片">
        <span class="photo-add-icon">+</span>
        <span class="photo-add-label">添加图片</span>
      </div>
    </div>
    <div style="font-size:var(--text-xs);color:var(--color-muted);text-align:center;">最多添加 3 张图片</div>
  </div>

  <!-- TOOLBAR -->
  <div class="toolbar">
    <div class="tool-btn active" id="tool-text" onclick="switchMode('text')" aria-label="文字模式">
      <span class="tool-icon">✏️</span>
      <span class="tool-label">文字</span>
    </div>
    <div class="tool-btn" id="tool-voice" onclick="switchMode('voice')" aria-label="语音模式">
      <span class="tool-icon">🎙️</span>
      <span class="tool-label">语音</span>
    </div>
    <div class="tool-btn" id="tool-photo" onclick="switchMode('photo')" aria-label="图片模式">
      <span class="tool-icon">🖼️</span>
      <span class="tool-label">图片</span>
    </div>
    <div class="tool-btn" onclick="showToast('🌤️ 晴天 · 23°C')" aria-label="天气">
      <span class="tool-icon">🌤️</span>
      <span class="tool-label">天气</span>
    </div>
    <div class="tool-btn" onclick="showToast('位置已添加：杭州西湖区')" aria-label="位置">
      <span class="tool-icon">📍</span>
      <span class="tool-label">位置</span>
    </div>
  </div>
</div>

<!-- SAVE -->
<div class="save-area">
  <button class="btn-save" id="save-btn" onclick="saveRecord()" title="保存情绪记录" aria-label="保存">
    💾 保存记录
  </button>
</div>

<div class="toast-ct" id="toast-ct"></div>

<script>
  // ── 读取上页选择 ──
  const moodKey   = sessionStorage.getItem('ml_mood')       || 'happy';
  const moodLabel = sessionStorage.getItem('ml_mood_label') || '快乐';
  const intensity = sessionStorage.getItem('ml_intensity')  || '7';

  const EMOJIS = {happy:'😊',calm:'😌',sad:'😔',anxious:'😤',angry:'😡',tired:'😴'};
  const GUIDES = {
    happy:'今天发生了什么让你感到这么开心的事情？试着把它写下来吧 🌟',
    calm:'享受这份平静真好。是什么让今天如此宁静？🌿',
    sad:'悲伤没什么不好，感受它是疗愈的第一步。今天是什么让你感到难过？🌧️',
    anxious:'焦虑往往来自某个具体的担忧。你现在最担心的是什么？🍃',
    angry:'愤怒是一种信号。什么事情触怒了你？把它说出来 🔥',
    tired:'你辛苦了。今天消耗了你最多精力的事情是什么？☁️'
  };

  document.getElementById('badge-emoji').textContent = EMOJIS[moodKey] || '😊';
  document.getElementById('badge-name').textContent  = moodLabel;
  document.getElementById('badge-intensity').textContent = `强度 ${intensity}/10`;
  document.getElementById('ai-guide-text').textContent = GUIDES[moodKey] || GUIDES.happy;

  // ── 字数统计 ──
  function updateCharCount(){
    const val = document.getElementById('main-input').value;
    const counter = document.getElementById('char-counter');
    counter.textContent = val.length + ' / 5000';
    counter.classList.toggle('warn', val.length > 4800);
  }

  // ── 模式切换 ──
  function switchMode(mode){
    ['text','voice','photo'].forEach(m=>{
      document.getElementById('panel-'+m).classList.toggle('active', m===mode);
      document.getElementById('tool-'+m)?.classList.toggle('active', m===mode);
    });
  }

  // ── 语音 ──
  let voiceTimer=null, voiceSec=0, isRecording=false;
  const sampleTexts=['今天下午开会，觉得有些焦虑，但项目还是顺利推进了。','早上跑了5公里，感觉状态超好，明天继续！'];
  function toggleVoice(){
    const btn=document.getElementById('voice-btn');
    if(!isRecording){
      isRecording=true; voiceSec=0;
      btn.classList.add('recording'); btn.textContent='⏹️';
      document.getElementById('voice-hint').textContent='录音中… 点击停止';
      voiceTimer=setInterval(()=>{
        voiceSec++;
        const m=Math.floor(voiceSec/60).toString().padStart(2,'0');
        const s=(voiceSec%60).toString().padStart(2,'0');
        document.getElementById('voice-time').textContent=m+':'+s;
        if(voiceSec>=180){ toggleVoice(); showToast('已达3分钟上限'); }
      },1000);
    } else {
      isRecording=false; clearInterval(voiceTimer);
      btn.classList.remove('recording'); btn.textContent='▶️';
      document.getElementById('voice-hint').textContent='录音已完成，可点击重新录制';
      // 模拟转写
      const ta=document.getElementById('transcription-area');
      document.getElementById('transcription-text').textContent=sampleTexts[Math.floor(Math.random()*sampleTexts.length)];
      ta.style.display='block';
      showToast('✅ 语音转文字完成');
    }
  }

  // ── 图片 ──
  const photoEmojis=['🌸','🌿','☀️','🎵','🍵','🌙'];
  let photoCount=0;
  function addPhoto(){
    if(photoCount>=3){showToast('最多只能添加 3 张图片');return;}
    photoCount++;
    const preview=document.getElementById('photo-preview');
    const add=preview.querySelector('.photo-add');
    const thumb=document.createElement('div');
    thumb.className='photo-thumb';
    const emoji=photoEmojis[Math.floor(Math.random()*photoEmojis.length)];
    thumb.innerHTML=`<span style="font-size:32px;">${emoji}</span><div class="photo-thumb-del" onclick="delPhoto(this)">×</div>`;
    thumb.style.background=['#FFF3E0','#E8F5E9','#E3F2FD'][photoCount-1];
    preview.insertBefore(thumb, add);
    if(photoCount>=3) add.style.display='none';
  }
  function delPhoto(btn){
    btn.closest('.photo-thumb').remove();
    photoCount--;
    document.querySelector('.photo-add').style.display='flex';
  }

  // ── 保存 ──
  function saveRecord(){
    const text=document.getElementById('main-input').value.trim();
    const saveBtn=document.getElementById('save-btn');
    saveBtn.disabled=true; saveBtn.innerHTML='⏳ 保存中…';
    setTimeout(()=>{
      sessionStorage.setItem('ml_entry_text', text||'（无文字内容）');
      location.href='page-04-report.html';
    }, 900);
  }

  function showToast(msg){
    const c=document.getElementById('toast-ct');
    const t=document.createElement('div'); t.className='toast'; t.textContent=msg; c.appendChild(t);
    requestAnimationFrame(()=>requestAnimationFrame(()=>t.classList.add('show')));
    setTimeout(()=>{t.classList.remove('show');setTimeout(()=>t.remove(),300);},2500);
  }
</script>
</body>
</html>
