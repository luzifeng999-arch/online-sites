<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Apple极简 · AI设计能力路线图</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Inter","PingFang SC","Microsoft YaHei",sans-serif;background:#f5f5f7;color:#1d1d1f;min-height:100vh;padding:32px 20px}
  .wrap{max-width:1320px;margin:0 auto;background:#fff;border-radius:20px;border:1px solid #e6e6eb;box-shadow:0 4px 20px rgba(0,0,0,.06);padding:28px 24px 20px}
  h2{font-size:20px;font-weight:700;margin-bottom:6px;letter-spacing:-.3px}
  .sub{color:#6e6e73;font-size:13px;margin-bottom:20px}
  .table{display:grid;grid-template-columns:160px repeat(6,1fr);gap:8px}
  .th{background:#f5f5f7;border:1px solid #e6e6eb;border-radius:10px;min-height:48px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;text-align:center;padding:6px 8px}
  .corner{background:transparent;border:none}
  .rowlabel{background:#fafafa;border:1px solid #e6e6eb;border-radius:10px;min-height:52px;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:13px;text-align:center;padding:6px 8px}
  .cell{border:1px dashed #e6e6eb;border-radius:10px;min-height:52px;background:transparent}
  .node{background:linear-gradient(180deg,#e8f4ff,#d5ecff);border:1px solid #aad4f5;border-radius:10px;min-height:52px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;text-align:center;padding:6px 8px;transition:.2s ease}
  .node:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(0,122,255,.18)}
  .foot{margin-top:16px;padding-top:14px;border-top:1px solid #e6e6eb;font-size:26px;font-weight:800;display:flex;align-items:center;gap:10px}
  .dot{width:20px;height:20px;border-radius:5px;background:#0071e3}
</style>
</head>
<body>
<div class="wrap">
  <h2>AI 设计能力路线图</h2>
  <p class="sub">Apple 极简风格 · 高留白 · 轻阴影</p>
  <div class="table">
    <!-- header row -->
    <div class="th corner"></div>
    <div class="th">意图/方案</div>
    <div class="th">创意生成</div>
    <div class="th">布局编辑</div>
    <div class="th">规范/资产治理</div>
    <div class="th">设计代码无损映射</div>
    <div class="th">上线/业务投放</div>
    <!-- UI/交互 -->
    <div class="rowlabel">UI/交互</div>
    <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
    <!-- 特效/动效 -->
    <div class="rowlabel">特效/动效</div>
    <div class="cell"></div><div class="node">粒子动效调研</div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
    <!-- 运营素材 -->
    <div class="rowlabel">运营素材</div>
    <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="node">素材模版AI化</div><div class="node">幸运盒子AI提效</div><div class="cell"></div>
    <!-- 贴纸生成 -->
    <div class="rowlabel">贴纸生成</div>
    <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
    <!-- 图像工作流 -->
    <div class="rowlabel">图像工作流</div>
    <div class="cell"></div><div class="node">明星合照底图</div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
    <!-- AI模版 -->
    <div class="rowlabel">AI模版</div>
    <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="node">品牌样式AI换肤</div><div class="cell"></div>
    <!-- AI工具 -->
    <div class="rowlabel">AI工具</div>
    <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="node">品牌MR提效</div>
  </div>
  <div class="foot">商业化 <span class="dot"></span></div>
</div>
</body>
</html>
