<!DOCTYPE html><html lang="zh-CN"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>2025年全球 AI Agent 市场趋势报告</title>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100vh;background:#0a0a0a;overflow:hidden;font-family:system-ui,-apple-system,'PingFang SC',sans-serif;color:#fff;}
#progress{position:fixed;top:0;left:0;height:2px;width:0%;background:#00D4FF;transition:width .3s ease;z-index:100;}
#mode-badge{position:fixed;top:12px;right:16px;z-index:100;background:rgba(0,212,255,.12);backdrop-filter:blur(8px);padding:4px 12px;border-radius:20px;font-size:11px;color:rgba(0,212,255,.9);border:1px solid rgba(0,212,255,.2);letter-spacing:1px;}
#stage{position:fixed;top:2px;left:0;right:0;bottom:56px;display:flex;align-items:center;justify-content:center;background:#0a0a0a;overflow:hidden;}
.slide-wrapper{width:1280px;height:720px;flex-shrink:0;position:relative;background:#050A14;box-shadow:0 8px 48px rgba(0,0,0,.6);transform-origin:center center;}
.slide-wrapper iframe{width:1280px;height:720px;border:none;display:block;transition:opacity .25s ease;}
.slide-wrapper.loading iframe{opacity:0;}
#slide-overlay{position:absolute;inset:0;pointer-events:none;z-index:10;transition:opacity .3s;opacity:0;background:rgba(0,0,0,.32);}
#controls{position:fixed;bottom:0;left:0;right:0;height:56px;background:rgba(10,10,10,.97);backdrop-filter:blur(12px);border-top:1px solid rgba(255,255,255,.07);display:flex;align-items:center;gap:10px;padding:0 14px;}
.nav-btn{width:32px;height:32px;border-radius:6px;border:1px solid rgba(255,255,255,.12);background:transparent;color:#fff;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:background .15s;flex-shrink:0;}
.nav-btn:hover{background:rgba(255,255,255,.1);}.nav-btn:disabled{opacity:.25;cursor:default;}
#bg-switcher{display:flex;gap:5px;align-items:center;flex-shrink:0;}.bg-dot{width:18px;height:18px;border-radius:50%;cursor:pointer;flex-shrink:0;border:2px solid transparent;transition:border-color .15s,transform .15s;}.bg-dot:hover{transform:scale(1.2);}.bg-dot.active{border-color:rgba(255,255,255,.85);}.bg-dot.checker{background-image:linear-gradient(45deg,#888 25%,transparent 25%),linear-gradient(-45deg,#888 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#888 75%),linear-gradient(-45deg,transparent 75%,#888 75%);background-size:6px 6px;background-position:0 0,0 3px,3px -3px,-3px 0;background-color:#fff;}
#thumbnails{flex:1;display:flex;gap:6px;overflow-x:auto;padding:4px 0;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.15) transparent;align-items:center;}#thumbnails::-webkit-scrollbar{height:3px;}#thumbnails::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:2px;}
.thumb-item{width:71px;height:40px;border-radius:4px;overflow:hidden;border:2px solid transparent;cursor:pointer;flex-shrink:0;transition:border-color .15s,transform .15s;background:#1a2a3a;}.thumb-item:hover{transform:scale(1.05);border-color:rgba(0,212,255,.35);}.thumb-item.active{border-color:#00D4FF;}.thumb-item iframe{width:1280px;height:720px;transform:scale(.0556);transform-origin:0 0;pointer-events:none;}
#page-num{font-size:13px;color:rgba(255,255,255,.4);white-space:nowrap;font-variant-numeric:tabular-nums;min-width:56px;text-align:center;flex-shrink:0;}
.tool-btn{width:32px;height:32px;border-radius:6px;border:1px solid rgba(255,255,255,.12);background:transparent;color:rgba(255,255,255,.7);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;}.tool-btn:hover{background:rgba(255,255,255,.1);color:#fff;}.tool-btn.active{background:rgba(0,212,255,.15);color:#00D4FF;border-color:rgba(0,212,255,.4);}
#export-btn{height:32px;padding:0 12px;border-radius:6px;border:1px solid rgba(255,255,255,.12);background:transparent;color:rgba(255,255,255,.8);cursor:pointer;font-size:12px;white-space:nowrap;transition:background .15s;flex-shrink:0;}#export-btn:hover{background:rgba(255,255,255,.1);color:#fff;}
.export-item{display:block;width:100%;padding:8px 14px;background:transparent;border:none;color:rgba(255,255,255,.85);font-size:13px;text-align:left;cursor:pointer;border-radius:5px;white-space:nowrap;transition:background .1s;}.export-item:hover{background:rgba(255,255,255,.1);}
#key-hint{position:fixed;bottom:64px;right:16px;font-size:11px;color:rgba(255,255,255,.2);pointer-events:none;z-index:90;}
</style></head><body>
<div id="progress"></div><div id="mode-badge">📊 专业模式 · 第1轮</div><div id="key-hint">← → 切换 | F 全屏</div>
<div id="stage"><div class="slide-wrapper" id="slide-wrapper"><div id="slide-overlay"></div></div></div>
<div id="controls"><button class="nav-btn" id="prev-btn" title="上一张 (←)" disabled>←</button><div id="thumbnails"></div><span id="page-num">1 / 10</span><button class="nav-btn" id="next-btn" title="下一张 (→)">→</button><div id="bg-switcher" title="切换查看器背景色"><div class="bg-dot active" style="background:#0a0a0a" data-bg="#0a0a0a" title="深黑"></div><div class="bg-dot" style="background:#1a1a2e" data-bg="#1a1a2e" title="深蓝黑"></div><div class="bg-dot" style="background:#2a2a2a" data-bg="#2a2a2a" title="中灰"></div><div class="bg-dot" style="background:#d0d0d0" data-bg="#d0d0d0" title="浅灰"></div><div class="bg-dot checker" data-bg="checker" title="棋盘格"></div></div><div id="bg-fx-group" style="display:flex;gap:3px;flex-shrink:0;"><button class="tool-btn active" data-fx="full" title="完整背景图效果">🖼</button><button class="tool-btn" data-fx="dim" title="淡化背景图">🌫</button><button class="tool-btn" data-fx="clean" title="纯净模式">✦</button></div><button class="tool-btn" id="fullscreen-btn" title="全屏 (F)">⛶</button><div id="export-group" style="position:relative;flex-shrink:0;"><button id="export-btn">↓ 导出</button><div id="export-menu" style="display:none;position:absolute;bottom:48px;right:0;background:rgba(15,20,30,.97);backdrop-filter:blur(12px);border:1px solid rgba(0,212,255,.15);border-radius:8px;padding:6px;min-width:180px;z-index:200;"><button class="export-item" data-action="png-current">📷 当前页 PNG</button><button class="export-item" data-action="pdf-all">📄 全套 PDF</button><button class="export-item" data-action="pptx-all">📊 全套 PPTX（截图版）</button><button class="export-item" data-action="png-zip">🗜 全套 PNG（ZIP）</button></div></div></div>
<script>
const SLIDES=['slide-01.html','slide-02.html','slide-03.html','slide-04.html','slide-05.html','slide-06.html','slide-07.html','slide-08.html','slide-09.html','slide-10.html'];
const TITLES=['封面','核心数据摘要','市场规模增长趋势','五大应用场景','竞争格局四象限','技术能力雷达图','企业落地挑战','三大关键预测','投资热区分布','结论与行动建议'];
const TOTAL=SLIDES.length;let current=0;const wrapper=document.getElementById('slide-wrapper');const overlay=document.getElementById('slide-overlay');const progress=document.getElementById('progress');const pageNum=document.getElementById('page-num');const prevBtn=document.getElementById('prev-btn');const nextBtn=document.getElementById('next-btn');const thumbs=document.getElementById('thumbnails');const stage=document.getElementById('stage');
function scaleSlide(){const sc=Math.min(stage.clientWidth/1280,stage.clientHeight/720);wrapper.style.transform=`scale(${sc})`;}scaleSlide();window.addEventListener('resize',scaleSlide);
function renderSlide(i){wrapper.classList.add('loading');const old=wrapper.querySelector('iframe');if(old)old.remove();const f=document.createElement('iframe');f.src=SLIDES[i];f.onload=()=>wrapper.classList.remove('loading');wrapper.appendChild(f);}
function buildThumbs(){thumbs.innerHTML='';SLIDES.forEach((src,i)=>{const item=document.createElement('div');item.className='thumb-item'+(i===0?' active':'');item.title=TITLES[i];const f=document.createElement('iframe');f.src=src;f.scrolling='no';item.appendChild(f);item.addEventListener('click',()=>goTo(i));thumbs.appendChild(item);});}
function goTo(i){if(i<0||i>=TOTAL)return;current=i;renderSlide(current);progress.style.width=((current+1)/TOTAL*100)+'%';pageNum.textContent=(current+1)+' / '+TOTAL;document.querySelectorAll('.thumb-item').forEach((el,j)=>el.classList.toggle('active',j===current));prevBtn.disabled=current===0;nextBtn.disabled=current===TOTAL-1;const at=thumbs.children[current];if(at)at.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});}
prevBtn.addEventListener('click',()=>goTo(current-1));nextBtn.addEventListener('click',()=>goTo(current+1));document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();goTo(current+1);}if(e.key==='ArrowLeft'){e.preventDefault();goTo(current-1);}if(e.key==='f'||e.key==='F')toggleFS();if(e.key==='Escape'&&document.fullscreenElement)document.exitFullscreen();});function toggleFS(){if(!document.fullscreenElement)document.documentElement.requestFullscreen();else document.exitFullscreen();}document.getElementById('fullscreen-btn').addEventListener('click',toggleFS);
document.querySelectorAll('.bg-dot').forEach(dot=>{dot.addEventListener('click',()=>{document.querySelectorAll('.bg-dot').forEach(d=>d.classList.remove('active'));dot.classList.add('active');const bg=dot.dataset.bg;if(bg==='checker'){stage.style.backgroundImage='linear-gradient(45deg,#555 25%,transparent 25%),linear-gradient(-45deg,#555 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#555 75%),linear-gradient(-45deg,transparent 75%,#555 75%)';stage.style.backgroundSize='16px 16px';stage.style.backgroundPosition='0 0,0 8px,8px -8px,-8px 0';stage.style.backgroundColor='#fff';}else{stage.style.backgroundImage='none';stage.style.backgroundColor=bg;}});});
document.querySelectorAll('[data-fx]').forEach(btn=>{btn.addEventListener('click',()=>{document.querySelectorAll('[data-fx]').forEach(b=>b.classList.remove('active'));btn.classList.add('active');const fx=btn.dataset.fx;if(fx==='full'){overlay.style.opacity='0';wrapper.style.filter='none';}else if(fx==='dim'){overlay.style.opacity='1';overlay.style.background='rgba(0,0,0,.32)';wrapper.style.filter='none';}else{overlay.style.opacity='1';overlay.style.background='rgba(0,0,0,.80)';wrapper.style.filter='none';}});});
const exportBtn=document.getElementById('export-btn');const exportMenu=document.getElementById('export-menu');exportBtn.addEventListener('click',e=>{e.stopPropagation();exportMenu.style.display=exportMenu.style.display==='none'?'block':'none';});document.addEventListener('click',()=>exportMenu.style.display='none');
async function captureSlide(i){return new Promise(res=>{const tmp=document.createElement('iframe');tmp.src=SLIDES[i];tmp.style.cssText='position:fixed;left:-9999px;top:0;width:1280px;height:720px;border:none;';document.body.appendChild(tmp);tmp.onload=async()=>{await new Promise(r=>setTimeout(r,800));const canvas=await html2canvas(tmp.contentDocument.body,{scale:2,width:1280,height:720,useCORS:true,allowTaint:true,backgroundColor:null});document.body.removeChild(tmp);res(canvas);};});}
document.querySelectorAll('.export-item').forEach(item=>{item.addEventListener('click',async()=>{exportMenu.style.display='none';const action=item.dataset.action;if(action==='png-current'){const c=await captureSlide(current);const a=document.createElement('a');a.href=c.toDataURL('image/png');a.download=`slide-${String(current+1).padStart(2,'0')}.png`;a.click();}else if(action==='pdf-all'){const {jsPDF}=window.jspdf;const doc=new jsPDF({orientation:'landscape',unit:'px',format:[1280,720]});for(let i=0;i<TOTAL;i++){const c=await captureSlide(i);if(i>0)doc.addPage();doc.addImage(c.toDataURL('image/jpeg',.92),'JPEG',0,0,1280,720);}doc.save('AI-Agent-市场趋势报告-2025-v9.pdf');}else if(action==='pptx-all'){alert('PPTX导出请使用截图版方案，当前本地环境建议导出 PDF');}else if(action==='png-zip'){const zip=new JSZip();for(let i=0;i<TOTAL;i++){const c=await captureSlide(i);const b64=c.toDataURL('image/png').split(',')[1];zip.file(`slide-${String(i+1).padStart(2,'0')}-${TITLES[i]}.png`,b64,{base64:true});}const blob=await zip.generateAsync({type:'blob'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='AI-Agent-市场趋势报告-2025-v9.zip';a.click();}});});
buildThumbs();goTo(0);
</script></body></html>
