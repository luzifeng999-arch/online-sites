<!DOCTYPE html><html lang="zh-CN"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=1280">
<title>Slide 09 — 投资热区分布</title>
<style>
:root{--bg:#050A14;--accent:#00D4FF;--accent-soft:rgba(0,212,255,0.12);--text-primary:#E8F4FD;--text-secondary:#7ECFEF;--text-muted:#4A90A4;--border:rgba(0,212,255,0.15);--radius:8px;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{width:1280px;height:720px;overflow:hidden;font-family:'Inter','PingFang SC',sans-serif;color:var(--text-primary);}
body{background:var(--bg);background-image:linear-gradient(rgba(5,10,20,0.82) 0%,rgba(5,10,20,0.78) 100%),url('images/bg-data.jpg');background-size:cover;background-position:center;}
[contenteditable]{outline:none;}[contenteditable]:hover{outline:1px dashed var(--accent);border-radius:3px;}[contenteditable]:focus{outline:2px solid var(--accent);border-radius:3px;background:var(--accent-soft);}
.slide-num{position:absolute;bottom:16px;right:24px;font-size:13px;color:var(--text-muted);}
.page-header{position:absolute;top:36px;left:52px;right:52px;height:72px;display:flex;flex-direction:column;gap:4px;}
.eyebrow{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--accent);}
h2{font-size:26px;font-weight:700;color:var(--text-primary);line-height:1.25;margin:0;}
.content{position:absolute;top:120px;left:40px;right:40px;bottom:48px;display:flex;gap:16px;}
#chart-container{flex:1;min-height:0;}
.right-panel{width:230px;display:flex;flex-direction:column;justify-content:center;gap:9px;}
.rc{background:rgba(5,10,20,0.62);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid rgba(0,212,255,0.1);border-radius:var(--radius);padding:12px 14px;display:flex;gap:10px;align-items:flex-start;}
.rc-icon{font-size:19px;flex-shrink:0;}
.rc-body{display:flex;flex-direction:column;gap:3px;}
.rc-val{font-size:22px;font-weight:900;color:var(--accent);line-height:1;}
.rc-lbl{font-size:12px;color:var(--text-secondary);line-height:1.3;}
.rc-sub{font-size:11px;color:var(--text-muted);}
.src-row{position:absolute;bottom:16px;left:52px;display:flex;align-items:center;gap:8px;}
.src-dot{width:4px;height:4px;border-radius:50%;background:var(--accent);}
.src-txt{font-size:11px;color:var(--text-muted);}
</style></head><body>
<div class="page-header">
  <span class="eyebrow" contenteditable="true">INVESTMENT LANDSCAPE · 投资热区分布</span>
  <h2 contenteditable="true">投资格局：基础模型吃掉最大蛋糕，工具链后发追赶</h2>
</div>
<div class="content">
  <div id="chart-container"></div>
  <div class="right-panel">
    <div class="rc"><span class="rc-icon">💰</span><div class="rc-body"><div class="rc-val" contenteditable="true">$380亿</div><div class="rc-lbl" contenteditable="true">2024–25总投融资额</div><div class="rc-sub" contenteditable="true">同比增长 +61%</div></div></div>
    <div class="rc"><span class="rc-icon">🏆</span><div class="rc-body"><div class="rc-val" contenteditable="true">$60亿</div><div class="rc-lbl" contenteditable="true">xAI 单笔最大融资</div><div class="rc-sub" contenteditable="true">Elon Musk创立</div></div></div>
    <div class="rc"><span class="rc-icon">📈</span><div class="rc-body"><div class="rc-val" contenteditable="true">340+</div><div class="rc-lbl" contenteditable="true">活跃投资机构</div><div class="rc-sub" contenteditable="true">同比增长 +89%</div></div></div>
    <div class="rc"><span class="rc-icon">🌏</span><div class="rc-body"><div class="rc-val" contenteditable="true">68%</div><div class="rc-lbl" contenteditable="true">投资集中于北美</div><div class="rc-sub" contenteditable="true">亚太占比升至22%</div></div></div>
  </div>
</div>
<div class="src-row"><div class="src-dot"></div><span class="src-txt" contenteditable="true">数据来源：Crunchbase、PitchBook 2025 | 统计区间 2024Q1–2025Q1</span></div>
<div class="slide-num">9 / 10</div>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<script>
const c=echarts.init(document.getElementById('chart-container'));
c.setOption({
  backgroundColor:'transparent',
  tooltip:{trigger:'item',backgroundColor:'rgba(13,27,42,.9)',borderColor:'rgba(0,212,255,.3)',textStyle:{color:'#E8F4FD',fontSize:12},formatter:p=>`${p.name}<br>${p.marker}${p.value}亿美元（${p.percent}%）`},
  /* 饼图图例竖排放左侧，不遮挡扇形标签 */
  legend:{orient:'vertical',left:8,top:'middle',textStyle:{color:'#7ECFEF',fontSize:12},itemGap:10},
  series:[{
    type:'pie',radius:['38%','72%'],center:['58%','50%'],
    label:{show:true,formatter:p=>`${p.value}亿\n${p.percent}%`,color:'#E8F4FD',fontSize:12,fontWeight:600,lineHeight:18},
    labelLine:{length:12,length2:8,lineStyle:{color:'rgba(0,212,255,.4)'}},
    data:[
      {value:152,name:'基础模型研发',itemStyle:{color:new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'#00D4FF'},{offset:1,color:'#0088AA'}])}},
      {value:91,name:'企业Agent平台',itemStyle:{color:new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'#A855F7'},{offset:1,color:'#6D28D9'}])}},
      {value:68,name:'垂直行业应用',itemStyle:{color:new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'#22D3EE'},{offset:1,color:'#0E7490'}])}},
      {value:46,name:'开发工具与SDK',itemStyle:{color:new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'#F59E0B'},{offset:1,color:'#B45309'}])}},
      {value:23,name:'安全与合规',itemStyle:{color:new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'#10B981'},{offset:1,color:'#065F46'}])}}
    ],
    emphasis:{scale:true,scaleSize:5,itemStyle:{shadowBlur:18,shadowColor:'rgba(0,212,255,.45)'}}
  }]
});
window.addEventListener('resize',()=>c.resize());
</script>
</body></html>
