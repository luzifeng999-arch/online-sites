<!DOCTYPE html><html lang="zh-CN"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=1280">
<title>Slide 01 — 封面</title>
<style>
:root{--bg:#050A14;--accent:#00D4FF;--accent-soft:rgba(0,212,255,0.12);--text-primary:#E8F4FD;--text-secondary:#7ECFEF;--text-muted:#4A90A4;--border:rgba(0,212,255,0.15);--radius:8px;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{width:1280px;height:720px;overflow:hidden;font-family:'Inter','PingFang SC',sans-serif;color:var(--text-primary);}
body{background:var(--bg);background-image:linear-gradient(rgba(5,10,20,0.55) 0%,rgba(5,10,20,0.50) 100%),url('images/bg-cover.jpg');background-size:cover;background-position:center top;}
[contenteditable]{outline:none;}[contenteditable]:hover{outline:1px dashed var(--accent);border-radius:3px;}[contenteditable]:focus{outline:2px solid var(--accent);border-radius:3px;background:var(--accent-soft);}
.slide-num{position:absolute;bottom:16px;right:24px;font-size:13px;color:var(--text-muted);}
/* 封面装饰 */
.deco-glow{position:absolute;top:-80px;right:-80px;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(0,212,255,0.12) 0%,transparent 65%);pointer-events:none;}
.ring-wrap{position:absolute;right:80px;top:50%;transform:translateY(-50%);width:340px;height:340px;pointer-events:none;}
.ring{position:absolute;inset:0;border-radius:50%;border:1px solid rgba(0,212,255,0.1);}
.ring2{position:absolute;inset:50px;border-radius:50%;border:1px solid rgba(0,212,255,0.08);}
.ring3{position:absolute;inset:100px;border-radius:50%;border:1px solid rgba(0,212,255,0.2);}
.ring-core{position:absolute;inset:150px;border-radius:50%;background:radial-gradient(circle,rgba(0,212,255,0.22) 0%,transparent 70%);}
.dot{position:absolute;width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 14px rgba(0,212,255,0.9);}
.corner-tag{position:absolute;top:0;right:0;background:var(--accent);color:var(--bg);padding:6px 20px;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;border-radius:0 0 0 var(--radius);}
/* 封面内容区 — 全屏自由排版，豁免统一标题规则 */
.cover-body{position:absolute;inset:0;display:flex;align-items:center;padding:0 96px;}
.cover-content{max-width:580px;display:flex;flex-direction:column;gap:20px;}
.eyebrow{font-size:12px;letter-spacing:4px;text-transform:uppercase;color:var(--accent);display:flex;align-items:center;gap:12px;}
.eyebrow::before{content:'';width:24px;height:1px;background:var(--accent);}
h1{font-size:52px;font-weight:900;line-height:1.1;letter-spacing:-1.5px;}
h1 em{color:var(--accent);font-style:normal;}
.subtitle{font-size:17px;color:var(--text-secondary);line-height:1.65;max-width:500px;}
.divider{width:56px;height:3px;background:var(--accent);border-radius:2px;}
.meta{display:flex;gap:32px;}
.mi{display:flex;flex-direction:column;gap:3px;}
.ml{font-size:10px;letter-spacing:2px;color:var(--text-muted);text-transform:uppercase;}
.mv{font-size:14px;color:var(--text-secondary);font-weight:500;}
</style>
</head><body>
<div class="deco-glow"></div>
<div class="ring-wrap">
  <div class="ring"></div><div class="ring2"></div><div class="ring3"></div><div class="ring-core"></div>
  <div class="dot" style="top:2px;left:50%;transform:translateX(-50%)"></div>
  <div class="dot" style="top:50%;right:2px;transform:translateY(-50%);opacity:.6"></div>
  <div class="dot" style="bottom:2px;left:50%;transform:translateX(-50%);opacity:.35"></div>
  <div class="dot" style="top:50%;left:2px;transform:translateY(-50%);opacity:.25"></div>
</div>
<div class="corner-tag" contenteditable="false">2025 · AI Report</div>
<div class="cover-body">
  <div class="cover-content">
    <div class="eyebrow" contenteditable="true">未来科技研究院 · 2025年3月</div>
    <h1 contenteditable="true">2025年<br><em>全球 AI Agent</em><br>市场趋势报告</h1>
    <p class="subtitle" contenteditable="true">从工具到同事——AI Agent 正在重塑每一个工作流</p>
    <div class="divider"></div>
    <div class="meta">
      <div class="mi"><span class="ml">发布方</span><span class="mv" contenteditable="true">未来科技研究院</span></div>
      <div class="mi"><span class="ml">日期</span><span class="mv" contenteditable="true">2025年3月</span></div>
      <div class="mi"><span class="ml">受众</span><span class="mv" contenteditable="true">企业中高层管理者</span></div>
    </div>
  </div>
</div>
<div class="slide-num">1 / 10</div>
</body></html>
