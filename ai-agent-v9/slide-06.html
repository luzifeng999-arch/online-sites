<!DOCTYPE html><html lang="zh-CN"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=1280">
<title>Slide 06 — 技术能力雷达图</title>
<style>
:root{--bg:#050A14;--accent:#00D4FF;--accent-soft:rgba(0,212,255,0.12);--text-primary:#E8F4FD;--text-secondary:#7ECFEF;--text-muted:#4A90A4;--border:rgba(0,212,255,0.15);--radius:8px;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{width:1280px;height:720px;overflow:hidden;font-family:'Inter','PingFang SC',sans-serif;color:var(--text-primary);}
body{background:var(--bg);background-image:linear-gradient(rgba(5,10,20,0.82) 0%,rgba(5,10,20,0.78) 100%),url('images/bg-data.jpg');background-size:cover;background-position:center;}
[contenteditable]{outline:none;}[contenteditable]:hover{outline:1px dashed var(--accent);border-radius:3px;}[contenteditable]:focus{outline:2px solid var(--accent);border-radius:3px;background:var(--accent-soft);}
.slide-num{position:absolute;bottom:16px;right:24px;font-size:13px;color:var(--text-muted);}
.page-header{position:absolute;top:36px;left:52px;right:52px;height:72px;display:flex;flex-direction:column;gap:4px;}
.eyebrow{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--accent);}
h2{font-size:26px;font-weight:700;color:var(--text-primary);line-height:1.25;margin:0;}
.content{position:absolute;top:120px;left:40px;right:40px;bottom:48px;display:flex;gap:12px;}
.side-cards{width:192px;display:flex;flex-direction:column;gap:10px;justify-content:center;}
.side-card{background:rgba(5,10,20,0.62);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid rgba(0,212,255,0.12);border-radius:var(--radius);padding:12px 14px;display:flex;flex-direction:column;gap:3px;}
.sc-score{font-size:30px;font-weight:900;color:var(--accent);line-height:1;}
.sc-lbl{font-size:12px;color:var(--text-secondary);}
#chart-container{flex:1;min-height:0;}
.src-row{position:absolute;bottom:16px;left:52px;display:flex;align-items:center;gap:8px;}
.src-dot{width:4px;height:4px;border-radius:50%;background:var(--accent);}
.src-txt{font-size:11px;color:var(--text-muted);}
</style></head><body>
<div class="page-header">
  <span class="eyebrow" contenteditable="true">CAPABILITY RADAR · 技术能力雷达图</span>
  <h2 contenteditable="true">六维能力扫描：推理规划与多模态领跑，记忆个性化待补强</h2>
</div>
<div class="content">
  <div class="side-cards">
    <div class="side-card"><div class="sc-score" contenteditable="true">9.2</div><div class="sc-lbl" contenteditable="true">多模态理解</div></div>
    <div class="side-card"><div class="sc-score" contenteditable="true">8.9</div><div class="sc-lbl" contenteditable="true">推理与规划</div></div>
    <div class="side-card"><div class="sc-score" contenteditable="true">8.8</div><div class="sc-lbl" contenteditable="true">长上下文处理</div></div>
  </div>
  <div id="chart-container"></div>
  <div class="side-cards">
    <div class="side-card"><div class="sc-score" contenteditable="true">8.5</div><div class="sc-lbl" contenteditable="true">工具调用能力</div></div>
    <div class="side-card"><div class="sc-score" contenteditable="true">7.5</div><div class="sc-lbl" contenteditable="true">安全与对齐</div></div>
    <div class="side-card"><div class="sc-score" contenteditable="true">7.2</div><div class="sc-lbl" contenteditable="true">记忆与个性化</div></div>
  </div>
</div>
<div class="src-row"><div class="src-dot"></div><span class="src-txt" contenteditable="true">满分10分制 | 数据来源：AI Agent 技术能力评估基准报告 2025 | 综合12家主要厂商均值</span></div>
<div class="slide-num">6 / 10</div>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<script>
const chart=echarts.init(document.getElementById('chart-container'));
chart.setOption({
  backgroundColor:'transparent',
  tooltip:{trigger:'item',backgroundColor:'rgba(13,27,42,.9)',borderColor:'rgba(0,212,255,.3)',textStyle:{color:'#E8F4FD',fontSize:12}},
  radar:{
    indicator:[{name:'多模态理解',max:10},{name:'长上下文处理',max:10},{name:'工具调用能力',max:10},{name:'记忆与个性化',max:10},{name:'推理与规划',max:10},{name:'安全与对齐',max:10}],
    shape:'polygon',splitNumber:5,center:['50%','50%'],radius:'75%',
    axisName:{color:'#7ECFEF',fontSize:12,fontWeight:500},
    splitLine:{lineStyle:{color:'rgba(0,212,255,.12)',width:1}},
    splitArea:{areaStyle:{color:['rgba(0,212,255,.03)','rgba(0,212,255,.05)','rgba(0,212,255,.03)','rgba(0,212,255,.05)','rgba(0,212,255,.03)']}},
    axisLine:{lineStyle:{color:'rgba(0,212,255,.15)'}}
  },
  series:[{type:'radar',data:[{value:[9.2,8.8,8.5,7.2,8.9,7.5],name:'AI Agent 能力评分',
    areaStyle:{color:new echarts.graphic.RadialGradient(.5,.5,1,[{offset:0,color:'rgba(0,212,255,.38)'},{offset:1,color:'rgba(0,212,255,.04)'}])},
    lineStyle:{color:'#00D4FF',width:2.5},itemStyle:{color:'#00D4FF',borderWidth:2,borderColor:'#050A14'},symbolSize:7,
    label:{show:true,color:'#00D4FF',fontSize:12,fontWeight:700,formatter:p=>p.value}
  }]}]
});
window.addEventListener('resize',()=>chart.resize());
</script>
</body></html>
