<!DOCTYPE html><html lang="zh-CN"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=1280">
<title>Slide 03 — 市场规模增长趋势</title>
<style>
:root{--bg:#050A14;--accent:#00D4FF;--accent-soft:rgba(0,212,255,0.12);--text-primary:#E8F4FD;--text-secondary:#7ECFEF;--text-muted:#4A90A4;--border:rgba(0,212,255,0.15);--radius:8px;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{width:1280px;height:720px;overflow:hidden;font-family:'Inter','PingFang SC',sans-serif;color:var(--text-primary);}
body{background:var(--bg);background-image:linear-gradient(rgba(5,10,20,0.82) 0%,rgba(5,10,20,0.78) 100%),url('images/bg-data.jpg');background-size:cover;background-position:center;}
[contenteditable]{outline:none;}[contenteditable]:hover{outline:1px dashed var(--accent);border-radius:3px;}[contenteditable]:focus{outline:2px solid var(--accent);border-radius:3px;background:var(--accent-soft);}
.slide-num{position:absolute;bottom:16px;right:24px;font-size:13px;color:var(--text-muted);}
.page-header{position:absolute;top:36px;left:52px;right:52px;height:72px;display:flex;flex-direction:column;gap:4px;}
.eyebrow{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--accent);line-height:1.2;}
h2{font-size:26px;font-weight:700;color:var(--text-primary);line-height:1.25;margin:0;}
#chart{position:absolute;top:116px;left:40px;right:40px;bottom:48px;}
.src-row{position:absolute;bottom:16px;left:52px;display:flex;align-items:center;gap:8px;}
.src-dot{width:4px;height:4px;border-radius:50%;background:var(--accent);flex-shrink:0;}
.src-txt{font-size:11px;color:var(--text-muted);}
</style></head><body>
<div class="page-header">
  <span class="eyebrow" contenteditable="true">MARKET SIZE TREND · 市场规模增长趋势</span>
  <h2 contenteditable="true">市场规模高速增长，2027年突破千亿美元大关</h2>
</div>
<div id="chart"></div>
<div class="src-row"><div class="src-dot"></div><span class="src-txt" contenteditable="true">数据来源：Gartner、IDC、a16z Research | E = 预测值 | 单位：亿美元</span></div>
<div class="slide-num">3 / 10</div>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<script>
const c=echarts.init(document.getElementById('chart'));
c.setOption({
  backgroundColor:'transparent',
  /* 图例放底部，避免与折线顶部标签和右Y轴标签重叠 */
  legend:{bottom:4,left:'center',textStyle:{color:'#7ECFEF',fontSize:12},data:['市场规模（亿美元）','同比增长（%）']},
  /* grid: top留标签空间, right:80防右Y轴截断, bottom:52为图例留空间 */
  grid:{top:32,right:80,bottom:52,left:72},
  tooltip:{trigger:'axis',axisPointer:{type:'cross'},backgroundColor:'rgba(13,27,42,.95)',borderColor:'rgba(0,212,255,.3)',textStyle:{color:'#E8F4FD',fontSize:12},
    formatter:p=>{let s=`<b>${p[0].axisValue}</b><br>`;p.forEach(x=>{s+=`${x.marker}${x.seriesName}: ${x.value!=null?x.value+(x.seriesIndex===0?' 亿美元':'%'):'—'}<br>`;});return s;}},
  xAxis:{type:'category',data:['2021','2022','2023','2024','2025E','2026E','2027E'],axisLine:{lineStyle:{color:'rgba(0,212,255,.2)'}},axisLabel:{color:'#7ECFEF',fontSize:12},axisTick:{show:false}},
  yAxis:[
    {type:'value',name:'亿美元',nameLocation:'end',nameTextStyle:{color:'#4A90A4',fontSize:11},nameGap:8,axisLine:{show:false},splitLine:{lineStyle:{color:'rgba(0,212,255,.07)'}},axisLabel:{color:'#4A90A4',fontSize:11}},
    {type:'value',name:'增长率 %',nameLocation:'end',nameTextStyle:{color:'#4A90A4',fontSize:11},nameGap:8,axisLine:{show:false},splitLine:{show:false},axisLabel:{color:'#4A90A4',fontSize:11,formatter:'{value}%'}}
  ],
  series:[
    {name:'市场规模（亿美元）',type:'bar',yAxisIndex:0,data:[52,89,158,283,472,801,1270],barWidth:'42%',
     itemStyle:{color:p=>p.dataIndex>=4?new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'rgba(0,212,255,.5)'},{offset:1,color:'rgba(0,212,255,.1)'}]):new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'#00D4FF'},{offset:1,color:'rgba(0,212,255,.25)'}]),borderRadius:[4,4,0,0]},
     label:{show:true,position:'top',color:'#7ECFEF',fontSize:11,fontWeight:600,formatter:p=>p.value>=1000?p.value.toLocaleString():p.value}},
    {name:'同比增长（%）',type:'line',yAxisIndex:1,data:[null,71,78,79,67,70,59],symbol:'circle',symbolSize:7,
     lineStyle:{color:'#A855F7',width:2.5},itemStyle:{color:'#A855F7',borderWidth:2,borderColor:'#050A14'},
     label:{show:true,position:'top',color:'#A855F7',fontSize:11,fontWeight:600,formatter:p=>p.value!=null?`+${p.value}%`:''},
     areaStyle:{color:new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'rgba(168,85,247,.15)'},{offset:1,color:'transparent'}])},connectNulls:false}
  ]
});
window.addEventListener('resize',()=>c.resize());
</script>
</body></html>
