<!DOCTYPE html><html lang="zh-CN"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=1280">
<title>Slide 02 — 核心数据摘要</title>
<style>
:root{--bg:#050A14;--accent:#00D4FF;--accent-soft:rgba(0,212,255,0.12);--text-primary:#E8F4FD;--text-secondary:#7ECFEF;--text-muted:#4A90A4;--border:rgba(0,212,255,0.15);--radius:8px;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{width:1280px;height:720px;overflow:hidden;font-family:'Inter','PingFang SC',sans-serif;color:var(--text-primary);}
body{background:var(--bg);background-image:linear-gradient(rgba(5,10,20,0.72) 0%,rgba(5,10,20,0.68) 100%),url('images/bg-content.jpg');background-size:cover;background-position:center;}
[contenteditable]{outline:none;}[contenteditable]:hover{outline:1px dashed var(--accent);border-radius:3px;}[contenteditable]:focus{outline:2px solid var(--accent);border-radius:3px;background:var(--accent-soft);}
.slide-num{position:absolute;bottom:16px;right:24px;font-size:13px;color:var(--text-muted);}
/* 统一标题区 — top:36 height:72 */
.page-header{position:absolute;top:36px;left:52px;right:52px;height:72px;display:flex;flex-direction:column;justify-content:flex-start;gap:4px;}
.eyebrow{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--accent);line-height:1.2;}
h2{font-size:26px;font-weight:700;color:var(--text-primary);line-height:1.25;margin:0;}
/* 内容区 — top:120 */
.content{position:absolute;top:120px;left:52px;right:52px;bottom:48px;display:flex;gap:14px;}
.kpi-card{flex:1;background:rgba(5,10,20,0.62);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(0,212,255,0.14);border-radius:var(--radius);padding:20px 18px;display:flex;flex-direction:column;gap:6px;position:relative;overflow:hidden;transition:background .2s,border-color .2s;}
.kpi-card:hover{background:rgba(0,212,255,0.07);border-color:rgba(0,212,255,0.3);}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent);opacity:.6;}
.kpi-val{font-size:38px;font-weight:900;color:var(--accent);line-height:1;letter-spacing:-1px;}
.kpi-lbl{font-size:13px;color:var(--text-secondary);font-weight:500;line-height:1.3;}
.kpi-sub{font-size:11px;color:var(--text-muted);margin-top:2px;}
.src-row{position:absolute;bottom:16px;left:52px;right:52px;display:flex;align-items:center;gap:8px;}
.src-dot{width:4px;height:4px;border-radius:50%;background:var(--accent);flex-shrink:0;}
.src-txt{font-size:11px;color:var(--text-muted);}
</style></head><body>
<div class="page-header">
  <span class="eyebrow" contenteditable="true">KEY METRICS · 核心数据摘要</span>
  <h2 contenteditable="true">核心数据：市场进入规模化爆发阶段</h2>
</div>
<div class="content">
  <div class="kpi-card"><div class="kpi-val" contenteditable="true">$472亿</div><div class="kpi-lbl" contenteditable="true">全球市场规模</div><div class="kpi-sub" contenteditable="true">2025年预测值（美元）</div></div>
  <div class="kpi-card"><div class="kpi-val" contenteditable="true">38.7%</div><div class="kpi-lbl" contenteditable="true">年复合增长率</div><div class="kpi-sub" contenteditable="true">CAGR 2021–2027E</div></div>
  <div class="kpi-card"><div class="kpi-val" contenteditable="true">62%</div><div class="kpi-lbl" contenteditable="true">企业采用率</div><div class="kpi-sub" contenteditable="true">同比增长 +23%</div></div>
  <div class="kpi-card"><div class="kpi-val" contenteditable="true">$1,270亿</div><div class="kpi-lbl" contenteditable="true">2027年预测规模</div><div class="kpi-sub" contenteditable="true">较2025年增长 2.7×</div></div>
  <div class="kpi-card"><div class="kpi-val" contenteditable="true">800万+</div><div class="kpi-lbl" contenteditable="true">全球活跃Agent</div><div class="kpi-sub" contenteditable="true">活跃实例（2025Q1）</div></div>
  <div class="kpi-card"><div class="kpi-val" contenteditable="true">$380亿</div><div class="kpi-lbl" contenteditable="true">2024–25投资总额</div><div class="kpi-sub" contenteditable="true">资本持续涌入</div></div>
</div>
<div class="src-row"><div class="src-dot"></div><span class="src-txt" contenteditable="true">数据来源：Gartner、IDC、a16z Research | E = 预测值</span></div>
<div class="slide-num">2 / 10</div>
</body></html>
